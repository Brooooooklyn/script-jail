# Committed parity baseline for the `diff` job of .github/workflows/parity-test.yml.
#
# SOURCE (current): the CI `linux-backend` job's Docker (Linux strace) audit of
# the pinned fixture — i.e. the `linux-lockfile` artifact of a `parity-test` run.
# It was historically generated by the macOS VZ CLI backend (Apple
# Virtualization.framework booting the Linux arm64 guest) on bare-metal Apple
# Silicon, but VZ's vsock go-handshake is broken on macOS 26 (see the
# `macos26-vz-vsock-go-handshake-broken` engineering note), so it can no longer
# be regenerated locally on current hardware.  This is sound because the sibling
# `diff-macos-bare` job re-derives BOTH the Docker (Linux) lock and the
# macOS-bare lock fresh on every run and asserts they are byte-identical after
# canonical re-render — so the Docker output committed here is a faithful stand-in
# for the macOS lock it is diffed against.
#
# It is consumed only by the `diff` job, via scripts/parity-diff.ts — which
# YAML-parses and canonically re-renders both sides before comparing, so this
# comment header (and the volatile `generated_at` / `manager_lockfile_sha256`
# fields, which are masked) never reach the byte comparison.
#
# Regenerate (when the fixture pin in test/parity/fixture.yml bumps or the audit
# logic changes): download the `linux-lockfile` artifact from a green
# `parity-test` run and replace the body below (keep this header); or, on
# pre-macOS-26 Apple Silicon, re-run:
#   node <script-jail>/dist/cli.cjs update --backend vz \
#     --lock <script-jail>/test/parity/macos-arm64-lockfile.yml
# then commit the result.  See docs/parity-testing.md.
#
# Why there are no `<AUDIT_BLIND>` markers here: this lock comes from a Linux
# guest (strace audit; SIP/dyld do not exist inside it).  `<AUDIT_BLIND>` is
# emitted only by the macOS-BARE Mach-O shim for non-redirectable SIP tools
# (see docs/divergence.md); the bare-backend lock is generated fresh in CI by
# the `macos-bare` job and is never read from this file.
