# npm-jar config. Hides these files/env vars from the lifecycle scripts running
# inside the Firecracker VM. Note: $HOME is an empty tmpfs in the VM regardless;
# entries here are still useful for repo-local paths and for documenting intent.

protected:
  files:
    - ~/.ssh/**
    - ~/.aws/**
    - ~/.npmrc
    - ~/.netrc
    - ~/.gnupg/**
    - $REPO/.env
    - $REPO/.env.*
  env:
    - NPM_TOKEN
    - NODE_AUTH_TOKEN
    - GITHUB_TOKEN
    - GH_TOKEN
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - AWS_SESSION_TOKEN
    - SSH_AUTH_SOCK

spoof:
  platform: linux
  arch: x64

node_version: 20
