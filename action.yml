name: script-jail
description: Backend-isolated audit of package-manager lifecycle scripts. Runs on lockfile changes; emits a human-readable .script-jail.lock.yml; fails the PR if the audit diverges from the committed lockfile.
author: brooklyn
branding:
  icon: lock
  color: purple

inputs:
  config:
    description: Path to the script-jail config file.
    required: false
    default: .script-jail.yml
  lock:
    description: Path to the install-lock file to compare/regenerate.
    required: false
    default: .script-jail.lock.yml
  mode:
    description: "`check` (default) fails on diff; `update` regenerates the lockfile in place."
    required: false
    default: check
  spoof-platform:
    description: "Spoofed value for process.platform inside the VM. One of: linux | darwin | win32."
    required: false
    default: linux
  spoof-arch:
    description: "Spoofed value for process.arch inside the VM. One of: x64 | arm64. Defaults to the runner CPU architecture."
    required: false
  backend:
    description: "Audit executor backend. One of: auto | firecracker | docker | bare. auto tries Firecracker, then Docker, then bare."
    required: false
    default: auto
  cache-firecracker:
    description: Cache the Firecracker binary + kernel across runs when backend includes Firecracker.
    required: false
    default: "true"
  args:
    description: "Extra install args, applied identically to the sandbox audit and the host install. Quote-grouped; never run through a shell. Pass args VALID FOR YOUR PACKAGE MANAGER (npm: `--omit=dev`; pnpm: `--prod`; yarn-berry install takes none) — a flag your manager rejects fails the audit. Only a fail-closed allowlist of dependency-selection flags (omit/include/prod/dev/optional/-P/-D) plus a credential-free `--registry` is forwarded; anything that could steer the install (lockfile/dir/output/scripts/global/workspace) is dropped with a warning. Registry AUTH goes in `.npmrc`/env, not here — a `--registry` URL with inline `user:pass@` credentials is dropped (the secret would otherwise be staged where the audited package can read it)."
    required: false
    default: ""
  install:
    description: "Drop-in install: `true` ALSO installs deps on the runner (package-manager install with lifecycle scripts disabled, then runs lifecycle scripts on the host ONLY if the sandbox audit matches the committed lock). Requires `mode: check` and a committed lock. Default `false` (audit only)."
    required: false
    default: "false"

outputs:
  lockfile:
    description: Absolute path to the generated install lockfile.
  diff:
    description: Unified diff between the generated and committed lockfile; empty on match.

runs:
  using: node24
  main: dist/main.cjs
