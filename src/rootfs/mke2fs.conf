# script-jail — pinned mke2fs.conf for byte-reproducible rootfs (R1).
#
# This file is consumed via the MKE2FS_CONFIG env var (see
# src/rootfs/build.ts:mkfsEnv) so that mke2fs does NOT read the runner host's
# /etc/mke2fs.conf and does NOT fall back to e2fsprogs-version-dependent
# compiled-in defaults.  Pinning the [defaults]/[fs_types] feature set + sizes
# here is load-bearing for the v0.1.1 manifest backfill, which must reproduce
# v0.1.0's released SHAs.
#
# Based on the stock /etc/mke2fs.conf shipped with e2fsprogs 1.47, but with the
# ext4 feature list spelled out EXPLICITLY and with `metadata_csum_seed` OMITTED
# (so the metadata-checksum seed derives from the pinned -U UUID instead of an
# independent random seed — the classic remaining ext4 nondeterminism; the
# build.ts argv also passes `-O ^metadata_csum_seed` as belt-and-suspenders).
#
# `has_journal` is listed as a default below for parity with the stock conf, but
# build.ts strips it at runtime via `-O ^has_journal` (the rootfs is read-mostly
# and ships without a journal).
#
# To refresh after an e2fsprogs bump: copy /etc/mke2fs.conf from the pinned
# e2fsprogs, re-apply the explicit ext4 feature list (omitting
# metadata_csum_seed), keep blocksize=4096 / inode_size=256 / inode_ratio=16384,
# then re-validate byte-reproducibility on a Linux runner in CI.

[defaults]
	base_features = sparse_super,large_file,filetype,resize_inode,dir_index,ext_attr
	default_mntopts = acl,user_xattr
	enable_periodic_fsck = 0
	blocksize = 4096
	inode_size = 256
	inode_ratio = 16384

[fs_types]
	ext3 = {
		features = has_journal
	}
	ext4 = {
		features = has_journal,extent,huge_file,flex_bg,metadata_csum,64bit,dir_nlink,extra_isize
		inode_size = 256
		blocksize = 4096
		inode_ratio = 16384
	}
