# script-jail — .github/workflows/release-build.yml
#
# Producer workflow ("build once, download forever").
#
# Why this exists:
#   The release pins each VM-image asset's SHA in a committed manifest
#   (src/action/artifact-manifest.ts) and the Action verifies downloaded assets
#   against it at runtime. The previous two-tag bootstrap REBUILT the images at
#   the second tag and byte-compared them to SHAs pinned from the first tag —
#   which forced a byte-reproducibility the kernels / Mach-O cannot satisfy.
#
#   This workflow builds EVERY image asset exactly once and stores them as
#   GitHub Actions artifacts (retention 90 days). A later `release.yml` run
#   DOWNLOADS those exact artifacts and verifies them (no rebuild). Because the
#   bytes are never regenerated, the determinism gates that the old release
#   build carried are intentionally absent here.
#
#   This workflow ALSO pushes the 4 GHCR rootfs Docker images and prints their
#   `image:tag@sha256:digest` refs, so the operator gets the full paste-block —
#   the 9 file SHAs plus the 4 Docker digests — needed to update
#   src/action/artifact-manifest.ts.
#
# Scope:
#   This workflow NEVER publishes to npm, creates a GitHub release, or verifies
#   the manifest. Those stay in release.yml, which consumes the artifacts this
#   workflow produces. It is dispatched manually against whatever ref the
#   operator selects, with the release tag passed as the required `tag` input
#   (under workflow_dispatch, github.ref_name is the dispatched BRANCH, not a
#   v*.*.* tag, so the tag must be supplied explicitly).

name: release-build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to cut, e.g. v0.1.1'
        required: true
        type: string

# Job-level permissions (set per-job below) override this default; we still
# pin contents:read at the workflow level so any future job that forgets to
# declare its own permissions gets the safest default.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # build-mac-bin — produce the macOS Mach-O artifacts: the VZ helper
  # `script-jail-vm-arm64-darwin` binary AND the native shim
  # `libscriptjail-arm64.dylib`.  Runs on a macos-latest Apple-Silicon runner;
  # emits both as a single workflow artifact that (a) the `build` job downloads
  # to compute their SHAs for the paste-block and (b) a later, separate
  # release.yml run downloads to publish.
  #
  # The dylib is the macOS-native (`DYLD_INSERT_LIBRARIES`) shim for the bare
  # backend; it can only be produced + ad-hoc signed on a macOS runner (the
  # Linux `cargo build` would emit an ELF, and `codesign` is macOS-only), which
  # is exactly why it lives here next to the VZ helper rather than in `build`.
  #
  # We keep this job tightly scoped — no `pnpm install`, no Docker, no
  # access to the consumer-tree of the action — so the macOS runner only
  # ever runs `cargo build` against the in-repo Rust workspace.  Splitting
  # this off (vs. running it inside `build`) also lets the (much cheaper)
  # rootfs build proceed in parallel on the Linux runner.
  # ---------------------------------------------------------------------------
  build-mac-bin:
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: . -> target

      # MACOSX_DEPLOYMENT_TARGET pins the VZ helper's LC_BUILD_VERSION minOS to
      # the documented VZ floor: macOS 14+ (README "On macOS 14 or newer",
      # docs/architecture.md, and src/cli/detect-platform.ts MIN_MACOS_MAJOR = 14
      # — the CLI refuses to run the VZ path below 14, so the helper never needs
      # to load there).  NOT the dylib's 11.0: that floor belongs to the bare
      # backend's injection artifacts; the helper's contract is the VZ floor.
      # rustc's aarch64-apple-darwin default happens to be 11.0 today, but the
      # explicit env + vtool assert makes the contract survive toolchain/SDK
      # bumps instead of riding an undocumented default.  The lipo assert pins
      # thin arm64 (the host-target build has no explicit --target, so a runner
      # arch change would otherwise slip through to the staged/hashed artifact).
      # Keep this pin in lockstep with MIN_MACOS_MAJOR.
      - name: cargo build (release)
        env:
          MACOSX_DEPLOYMENT_TARGET: '14.0'
        run: |
          set -euo pipefail
          cargo build --release -p script-jail-host-mac
          HELPER=target/release/script-jail-vm
          ARCHS="$(lipo -archs "$HELPER" | tr -d '[:space:]')"
          if [ "$ARCHS" != "arm64" ]; then
            echo "::error::script-jail-vm is not a thin arm64 Mach-O (lipo -archs = ${ARCHS:-<unreadable>})" >&2
            exit 1
          fi
          MINOS="$(vtool -show-build "$HELPER" | awk '/minos/ { print $2; exit }')"
          if [ "$MINOS" != "14.0" ]; then
            echo "::error::script-jail-vm minOS is '${MINOS:-<unparsable>}', expected 14.0 (the documented VZ floor) — MACOSX_DEPLOYMENT_TARGET was not honored by the cargo link" >&2
            exit 1
          fi

      # Build the macOS-native shim cdylib.  Mirrors scripts/build.ts
      # `buildShimMac`: explicit `--target aarch64-apple-darwin` (the runner's
      # host target, already installed) so the output path is deterministic.
      # MACOSX_DEPLOYMENT_TARGET pins the cdylib link's LC_BUILD_VERSION minOS —
      # a newer runner SDK would otherwise stamp its own default (e.g. 26.0),
      # producing a dylib that fails to load on the documented macOS floor
      # (macOS 14+, dylib floor 11.0).  The post-build vtool assert mirrors
      # scripts/build.ts shimDylibMinOS / SHIM_PINNED_MINOS — keep both pins in
      # lockstep so they don't drift silently.
      - name: Build macOS shim dylib (release)
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: |
          set -euo pipefail
          cargo build --release --manifest-path src/shim/Cargo.toml --target aarch64-apple-darwin
          DYLIB=target/aarch64-apple-darwin/release/libscriptjail.dylib
          MINOS="$(vtool -show-build "$DYLIB" | awk '/minos/ { print $2; exit }')"
          if [ "$MINOS" != "11.0" ]; then
            echo "::error::libscriptjail.dylib minOS is '${MINOS:-<unparsable>}', expected 11.0 — MACOSX_DEPLOYMENT_TARGET was not honored by the cargo link" >&2
            exit 1
          fi

      - name: Stage binaries
        run: |
          set -euo pipefail
          mkdir -p artifacts/mac-bin
          cp target/release/script-jail-vm \
             artifacts/mac-bin/script-jail-vm-arm64-darwin
          cp target/aarch64-apple-darwin/release/libscriptjail.dylib \
             artifacts/mac-bin/libscriptjail-arm64.dylib

      # Ad-hoc sign + verify the dylib.  MANDATORY on Apple Silicon and required
      # for injection into the re-signed node (Phase 4).  `--force` re-stamps the
      # linker's adhoc+linker-signed signature as a plain adhoc one, matching
      # scripts/build.ts.  The SHA pinned in the manifest is the POST-sign SHA, so
      # signing MUST happen before the upload (and before the `build` job's
      # `Compute SHAs` step hashes the downloaded copy).
      - name: Ad-hoc sign + verify macOS shim dylib
        run: |
          set -euo pipefail
          codesign --force --sign - artifacts/mac-bin/libscriptjail-arm64.dylib
          codesign --verify --verbose artifacts/mac-bin/libscriptjail-arm64.dylib

      # Bare-backend SIP-substitution binaries (plain arm64, NO arm64e): the shim
      # redirects /bin/sh + /bin/bash → bash-arm64 and coreutils → coreutils-arm64
      # so a thin-arm64 dylib suffices.  Mirrors scripts/build.ts
      # `fetchMacCoreutils` + `buildMacBash`.  uutils is the official prebuilt —
      # verify the BINARY sha (stable; the upstream .tar.gz is recompressed
      # periodically so its archive sha drifts).  bash is built from source as
      # plain arm64 + ad-hoc signed.  Both SHAs flow into the build job's
      # `Compute SHAs` paste-block for manifest backfill.
      - name: Build bare-backend substitution binaries (uutils + bash)
        run: |
          set -euo pipefail
          mkdir -p artifacts/mac-bin
          # --- uutils coreutils 0.4.0 (official prebuilt, verify BINARY sha) ---
          UU_URL="https://github.com/uutils/coreutils/releases/download/0.4.0/coreutils-0.4.0-aarch64-apple-darwin.tar.gz"
          UU_BIN_SHA="8e8f38d9323135a19a73d617336fce85380f3c46fcb83d3ae3e031d1c0372f21"
          curl -fsSL --retry 3 -o /tmp/uu.tgz "$UU_URL"
          mkdir -p /tmp/uu && tar -xzf /tmp/uu.tgz -C /tmp/uu
          UU_BIN="$(find /tmp/uu -type f -name coreutils | head -1)"
          GOT="$(shasum -a 256 "$UU_BIN" | cut -d' ' -f1)"
          if [ "$GOT" != "$UU_BIN_SHA" ]; then
            echo "uutils coreutils BINARY sha mismatch: expected $UU_BIN_SHA got $GOT" >&2; exit 1
          fi
          cp "$UU_BIN" artifacts/mac-bin/coreutils-arm64
          chmod 0755 artifacts/mac-bin/coreutils-arm64
          ARCHS="$(lipo -archs artifacts/mac-bin/coreutils-arm64 | tr -d '[:space:]')"
          if [ "$ARCHS" != "arm64" ]; then
            echo "coreutils is not thin arm64 (archs=$ARCHS)" >&2; exit 1
          fi
          # uutils is a PREBUILT we don't control, so the minOS gate is
          # "loads on the documented macOS floor" (minos <= 11.0), NOT the
          # exact-equality pin the dylib/bash builds use — a lower minOS is
          # fine, only a minOS above the floor would fail to load.  The 0.4.0
          # prebuilt carries minos 11.0 today; this catches a future pin bump
          # to a binary stamped above the floor.  Mirrors scripts/build.ts
          # validateMacCoreutils.
          MINOS="$(vtool -show-build artifacts/mac-bin/coreutils-arm64 | awk '/minos/ { print $2; exit }')"
          if [ -z "$MINOS" ] || [ "$(printf '%s\n%s\n' "$MINOS" "11.0" | sort -V | tail -1)" != "11.0" ]; then
            echo "coreutils minOS is '${MINOS:-<unparsable>}', expected <= 11.0 (must load on the documented macOS floor)" >&2; exit 1
          fi
          # --- bash 5.3 from source (plain arm64, verify SOURCE sha) ---
          BASH_URL="https://ftp.gnu.org/gnu/bash/bash-5.3.tar.gz"
          BASH_SRC_SHA="0d5cd86965f869a26cf64f4b71be7b96f90a3ba8b3d74e27e8e9d9d5550f31ba"
          curl -fsSL --retry 3 --retry-delay 2 -o /tmp/bash.tgz "$BASH_URL"
          GOT="$(shasum -a 256 /tmp/bash.tgz | cut -d' ' -f1)"
          if [ "$GOT" != "$BASH_SRC_SHA" ]; then
            echo "bash source sha mismatch: expected $BASH_SRC_SHA got $GOT" >&2; exit 1
          fi
          mkdir -p /tmp/bash && tar -xzf /tmp/bash.tgz -C /tmp/bash
          BASH_SRC="$(find /tmp/bash -maxdepth 1 -type d -name 'bash-*' | head -1)"
          # -mmacosx-version-min pins bash's minOS to the dylib floor (11.0);
          # bash's Makefile propagates CFLAGS to the link line via BASE_LDFLAGS,
          # so no separate LDFLAGS is needed.  Mirrors scripts/build.ts
          # buildMacBash / SHIM_PINNED_MINOS.
          ( cd "$BASH_SRC" && ./configure --without-bash-malloc CFLAGS="-arch arm64 -Os -mmacosx-version-min=11.0" && make -j )
          codesign --force --sign - "$BASH_SRC/bash"
          ARCHS="$(lipo -archs "$BASH_SRC/bash" | tr -d '[:space:]')"
          if [ "$ARCHS" != "arm64" ]; then
            echo "bash is not thin arm64 (archs=$ARCHS)" >&2; exit 1
          fi
          MINOS="$(vtool -show-build "$BASH_SRC/bash" | awk '/minos/ { print $2; exit }')"
          if [ "$MINOS" != "11.0" ]; then
            echo "bash minOS is '${MINOS:-<unparsable>}', expected 11.0" >&2; exit 1
          fi
          cp "$BASH_SRC/bash" artifacts/mac-bin/bash-arm64
          chmod 0755 artifacts/mac-bin/bash-arm64
          file artifacts/mac-bin/coreutils-arm64 artifacts/mac-bin/bash-arm64

      # The ARTIFACT name is tag-suffixed (`mac-bin-<tag>`) so a later
      # release.yml run on the tag can locate exactly this producer run's
      # output by name across runs.  The on-disk FILENAMEs inside the artifact
      # stay `script-jail-vm-arm64-darwin` / `libscriptjail-arm64.dylib` (the
      # names check-publish-artifacts.sh and assemble-npm-packages.mjs expect at
      # the artifacts root).
      - name: Upload Mach-O artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mac-bin-${{ inputs.tag }}
          path: |
            artifacts/mac-bin/script-jail-vm-arm64-darwin
            artifacts/mac-bin/libscriptjail-arm64.dylib
            artifacts/mac-bin/coreutils-arm64
            artifacts/mac-bin/bash-arm64
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------------------
  # build — produce every Linux/Darwin image asset + push the 4 GHCR rootfs
  # images, exactly once.  Runs with NO write capabilities to the repo (only
  # `packages: write` for the GHCR push) and no persisted checkout credentials.
  # The assets are uploaded as the `release-assets-<tag>` artifact; a later
  # release.yml run downloads + verifies them.
  # ---------------------------------------------------------------------------
  build:
    # Requires `build-mac-bin` because the SHA paste-block needs to include the
    # Mach-O binary's hash.  The runner downloads that artifact mid-job to feed
    # it into `Compute SHAs`.
    needs: build-mac-bin
    runs-on: ubuntu-24.04
    # The rootfs build invokes Docker + mkfs.ext4 for each runner image and
    # architecture. The VZ kernel build adds another pair of long native
    # builds, and the GHCR push re-runs the 4 buildx builds, so the total
    # budget needs a wide ceiling.
    timeout-minutes: 60
    permissions:
      # contents:read for checkout; packages:write for the GHCR rootfs push.
      # NO id-token (no npm publish) and NO contents:write (no GitHub release)
      # — those stay in release.yml.
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Don't leave the GITHUB_TOKEN persisted as a git credential after
          # checkout.  install/build phases run npm/pnpm lifecycle scripts and
          # Docker — a compromised dep should not inherit a repo token, even a
          # read-only one.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # The shim is a Rust cdylib (`src/shim/`); cargo is required before
      # `pnpm build` or the explicit shim-build step further down.  The
      # version pin matches `rust-toolchain.toml`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build action bundle
        run: pnpm build:bundle

      - name: Build CLI bundle
        # The macOS CLI ships as `dist/cli.cjs` and is consumed by `npm install`
        # users on Darwin.  We bundle it in the same build flow so the npm
        # tarball that pairs with this run carries an up-to-date CLI.
        run: pnpm build:cli

      # The standalone canonical-rootfs-hash tool (dist/repro-hash-cli.cjs) is
      # run BELOW by this job's "Compute SHAs" step (and by the downstream
      # release.yml publish job + scripts/check-publish-artifacts.sh) always
      # straight from the COMMITTED bundle.  Rebuild it here and fail the build
      # if the committed copy is stale, so a source change to
      # src/rootfs/repro-hash*.ts can never pin (or later verify) a manifest SHA
      # with masking logic that differs from what consumers run.  Mirrors
      # test.yml's gate.
      - name: Build repro-hash CLI bundle
        run: pnpm build:repro-hash

      - name: Verify dist/repro-hash-cli.cjs is up to date
        run: |
          if ! git diff --exit-code -- dist/repro-hash-cli.cjs; then
            echo "::error::dist/repro-hash-cli.cjs is out of date. Run 'pnpm build:repro-hash' locally and commit the result."
            exit 1
          fi

      - name: Build Rust shim (x86_64)
        run: |
          cargo build --release --manifest-path src/shim/Cargo.toml
          cp target/release/libscriptjail.so images/libscriptjail.so

      # The cross-toolchain is required so cargo-zigbuild + zig produce the
      # aarch64-unknown-linux-gnu ELF .so from the amd64 release runner.
      # The same tool also works from macOS, so a future move to a different
      # runner doesn't require
      # touching the build script.  rustup-target-add is invoked first
      # because dtolnay/rust-toolchain's `stable` does not pre-install it.
      - name: Install arm64 cross-toolchain (kernel deps only)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            flex \
            bison \
            libelf-dev \
            libssl-dev \
            bc \
            xz-utils \
            gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build Rust shim (arm64 — cross-compile via cargo-zigbuild)
        run: pnpm build -- --skip-rootfs --skip-bundle --shim-arm64

      # The arm64 rootfs builds below run `docker buildx --platform=linux/arm64`
      # on an x86_64 runner.  Without QEMU binfmt registration the runner
      # kernel can't execute the arm64 `/bin/sh` (etc.) the buildx steps
      # invoke, surfacing as `exec /bin/sh: exec format error`.  Registered
      # once here so both arm64 rootfs build steps (ubuntu-22.04, ubuntu-24.04)
      # AND the arm64 GHCR push below see it.  No-op for the x64 builds.
      - name: Register QEMU binfmt handlers (for linux/arm64 build)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      # Build BOTH x64 rootfs ext4 images, reusing the bundle + shim built above.
      # `--skip-bundle` and `--skip-shim` avoid the redundant work the build
      # script would otherwise repeat per --runner-image invocation.
      - name: Build rootfs (ubuntu-22.04, x64)
        run: pnpm build -- --runner-image=ubuntu-22.04 --skip-bundle --skip-shim

      - name: Build rootfs (ubuntu-24.04, x64)
        run: pnpm build -- --runner-image=ubuntu-24.04 --skip-bundle --skip-shim

      # Build the two arm64 rootfs ext4 images for the macOS CLI.
      # `--arch=arm64` selects the arm64 base image AND skips the redundant
      # x64 shim build (the arm64 .so above already produced
      # `images/libscriptjail-arm64.so`).
      - name: Build rootfs (ubuntu-22.04, arm64)
        run: pnpm build -- --runner-image=ubuntu-22.04 --arch=arm64 --skip-bundle --skip-shim

      - name: Build rootfs (ubuntu-24.04, arm64)
        run: pnpm build -- --runner-image=ubuntu-24.04 --arch=arm64 --skip-bundle --skip-shim

      # The arm64 rootfs build stages libscriptjail-arm64.so to the canonical
      # images/libscriptjail.so path because Dockerfile.base has one COPY
      # target. Restore the x64 shim before computing/uploading the Linux
      # action artifact.
      - name: Restore x64 shim artifact
        run: cp target/release/libscriptjail.so images/libscriptjail.so

      # Build the two VZ kernels. Pinned upstream version + per-arch config;
      # see images/kernel/build.sh for the full pipeline.
      - name: Build vmlinux-vz (x86_64)
        run: bash images/kernel/build.sh --arch=x86_64 --force

      - name: Build vmlinux-vz (arm64)
        run: bash images/kernel/build.sh --arch=arm64 --force

      # Compute SHA-256 of every released artifact and surface them in the
      # job summary so the maintainer can copy the digests into
      # src/action/artifact-manifest.ts before cutting the next release.
      # The macOS Mach-O artifacts (`script-jail-vm-arm64-darwin` and the signed
      # `libscriptjail-arm64.dylib`) are produced by the `build-mac-bin` job
      # above; we re-fetch them here via the single workflow artifact so the SHA
      # summary can include both in the paste-block.
      - name: Download macOS Mach-O artifacts
        uses: actions/download-artifact@v8
        with:
          name: mac-bin-${{ inputs.tag }}
          path: artifacts/mac-bin

      - name: Compute SHAs
        run: |
          set -euo pipefail
          # Rootfs ext4 images are pinned by their CANONICAL hash (volatile
          # superblock time fields masked — see src/rootfs/repro-hash.ts), so the
          # value survives the e2fsprogs close-flush s_wtime re-stamp.  Everything
          # else (the .so shims, the VZ kernels, the Mach-O binary) is pinned by a
          # plain sha256sum.  These two digest kinds MUST match how
          # check-publish-artifacts.sh recomputes them in the release.yml publish
          # job and how preFetchArtifacts verifies the rootfs at consumer runtime.
          # --- Linux platform artifacts ---
          LINUX_ROOTFS_22="$(node dist/repro-hash-cli.cjs images/rootfs-ubuntu-22.04.ext4)"
          LINUX_ROOTFS_24="$(node dist/repro-hash-cli.cjs images/rootfs-ubuntu-24.04.ext4)"
          LINUX_LIBSO="$(sha256sum images/libscriptjail.so | cut -d' ' -f1)"
          # --- Darwin platform artifacts ---
          DARWIN_ROOTFS_22_ARM64="$(node dist/repro-hash-cli.cjs images/rootfs-ubuntu-22.04-arm64.ext4)"
          DARWIN_ROOTFS_24_ARM64="$(node dist/repro-hash-cli.cjs images/rootfs-ubuntu-24.04-arm64.ext4)"
          DARWIN_LIBSO_ARM64="$(sha256sum images/libscriptjail-arm64.so | cut -d' ' -f1)"
          # The macOS-native shim dylib is pinned by a PLAIN sha256 (it is the
          # SIGNED Mach-O produced + ad-hoc signed in build-mac-bin), not the
          # canonical rootfs hash.
          DARWIN_DYLIB_ARM64="$(sha256sum artifacts/mac-bin/libscriptjail-arm64.dylib | cut -d' ' -f1)"
          # Bare-backend substitution binaries (plain sha256 of the BINARY).
          DARWIN_COREUTILS_ARM64="$(sha256sum artifacts/mac-bin/coreutils-arm64 | cut -d' ' -f1)"
          DARWIN_BASH_ARM64="$(sha256sum artifacts/mac-bin/bash-arm64 | cut -d' ' -f1)"
          VMLINUX_VZ_X86_64="$(sha256sum images/vmlinux-vz-x86_64 | cut -d' ' -f1)"
          VMLINUX_VZ_ARM64="$(sha256sum images/vmlinux-vz-arm64 | cut -d' ' -f1)"
          SJ_VM_ARM64_DARWIN="$(sha256sum artifacts/mac-bin/script-jail-vm-arm64-darwin | cut -d' ' -f1)"
          # --- Emit the manifest paste-block to the job summary ---
          {
            echo "## Artifact SHAs"
            echo
            echo "Update \`src/action/artifact-manifest.ts\` with:"
            echo
            echo '```ts'
            echo "export const PINNED_MANIFEST: ArtifactManifest = {"
            echo "  repo: '${{ github.repository }}',"
            echo "  tag: '${{ inputs.tag }}',"
            echo "  expected: {"
            echo "    linux: {"
            echo "      'rootfs-ubuntu-22.04.ext4': '${LINUX_ROOTFS_22}',"
            echo "      'rootfs-ubuntu-24.04.ext4': '${LINUX_ROOTFS_24}',"
            echo "      'libscriptjail.so':         '${LINUX_LIBSO}',"
            echo "    },"
            echo "    darwin: {"
            echo "      'rootfs-ubuntu-22.04-arm64.ext4': '${DARWIN_ROOTFS_22_ARM64}',"
            echo "      'rootfs-ubuntu-24.04-arm64.ext4': '${DARWIN_ROOTFS_24_ARM64}',"
            echo "      'libscriptjail-arm64.so':         '${DARWIN_LIBSO_ARM64}',"
            echo "      'libscriptjail-arm64.dylib':      '${DARWIN_DYLIB_ARM64}',"
            echo "      'coreutils-arm64':                '${DARWIN_COREUTILS_ARM64}',"
            echo "      'bash-arm64':                     '${DARWIN_BASH_ARM64}',"
            echo "      'vmlinux-vz-x86_64':              '${VMLINUX_VZ_X86_64}',"
            echo "      'vmlinux-vz-arm64':               '${VMLINUX_VZ_ARM64}',"
            echo "      'script-jail-vm-arm64-darwin':    '${SJ_VM_ARM64_DARWIN}',"
            echo "    },"
            echo "  },"
            echo "};"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Hand the BINARY image assets to the downstream release.yml run via a
      # workflow artifact.  Using a workflow artifact (rather than a job output
      # or cache) keeps the build job side-effect-free outside its own
      # filesystem.
      #
      # The artifact NAME is tag-suffixed (`release-assets-<tag>`) so a later
      # release.yml run on the tag can locate exactly this producer run's
      # output by name across runs (the producer runs on a DIFFERENT commit
      # than the tag, so a commit-SHA match is impossible — the tag value is
      # the join key).
      #
      # We deliberately ship ONLY the binary image assets — NOT `dist/*`.  The
      # npm package's JS bundles (`dist/main.cjs`, `dist/cli.cjs`,
      # `dist/guest-agent.cjs`, `dist/preloads/*.cjs`) are staged by
      # release.yml from the TAGGED checkout (REPO_ROOT), which carries the
      # real backfilled manifest; this producer's `dist/main.cjs` still embeds
      # the PRE-backfill placeholder manifest, so shipping it would publish a
      # broken Action.  (The GHCR build above reads dist/guest-agent.cjs +
      # preloads from this checkout — that's fine: those bundles are
      # manifest-invariant and committed.)
      #
      # LAYOUT CONTRACT: every path below shares a single `images/` prefix, so
      # upload-artifact collapses the common ancestor and the artifact contents
      # are FLAT (rootfs-*.ext4, libscriptjail*.so, vmlinux-vz-* at the artifact
      # root). release.yml's download step relies on this by downloading into
      # `artifacts/images/` to restore the `artifacts/images/<name>` layout
      # check-publish-artifacts.sh expects. Adding a path OUTSIDE `images/` here
      # would shift the common ancestor to the repo root and break that download
      # target — keep every entry under `images/`.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ inputs.tag }}
          path: |
            images/rootfs-ubuntu-22.04.ext4
            images/rootfs-ubuntu-24.04.ext4
            images/rootfs-ubuntu-22.04-arm64.ext4
            images/rootfs-ubuntu-24.04-arm64.ext4
            images/libscriptjail.so
            images/libscriptjail-arm64.so
            images/vmlinux-vz-x86_64
            images/vmlinux-vz-arm64
          if-no-files-found: error
          retention-days: 90

      # ---------------------------------------------------------------------
      # GHCR push (relocated from release.yml's publish job).  The 4 rootfs
      # Docker images are NOT byte-reproducible, so they too must be built
      # ONCE here and only their digests verified later.  We push them and
      # emit the 4 `image:tag@sha256:digest` refs to the step summary so the
      # operator can paste them into the manifest's `dockerImages` block.
      #
      # This producer pushes the FLOATING stable tags (`:ubuntu-22.04`,
      # `:ubuntu-24.04`, and the `-arm64` variants), so it MUST be dispatched
      # deliberately on the exact commit being released.  We intentionally do
      # NOT gate the push on `github.ref_type == 'tag'`: this is dispatched from
      # a BRANCH, so such a guard would wrongly skip the push.  Moving a floating
      # tag is safe for real consumers because they pin by `@sha256:` digest (the
      # digest recorded in the manifest), not by tag — a tag move never affects a
      # digest-pinned consumer.
      #
      # QEMU binfmt is already registered above (the arm64 rootfs builds need
      # it); Buildx + GHCR login are set up immediately before the push.
      # ---------------------------------------------------------------------
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish Docker rootfs images
        run: |
          set -euo pipefail

          # In this producer job every input already lives at its final in-tree
          # path: the dist/ bundles were built above, images/libscriptjail.so is
          # the restored x64 shim, and images/libscriptjail-arm64.so is the
          # cross-built arm64 shim.  (In release.yml's old publish job these were
          # copied out of the downloaded `artifacts/` tree first; here there is
          # no such copy because nothing was downloaded.)
          vp_version="$(sed -nE "s/^export const VITE_PLUS_VERSION = '([^']+)'.*/\1/p" src/rootfs/vite-plus.ts)"
          node_version="$(sed -nE "s/^export const NODE_VERSION = '([^']+)'.*/\1/p" src/rootfs/vite-plus.ts)"

          # Read the per-arch vp tarball SHA from the TYPED `VITE_PLUS_SHA256`
          # object, NOT by text-parsing vite-plus.ts.  vite-plus.ts also exports
          # `VITE_PLUS_DARWIN_SHA256` (same x64/arm64 keys), so a bare
          # `sed .../x64:/` matched BOTH objects and emitted a two-line value —
          # the original v0.2.0 producer bug, which made sha256sum verify the
          # linux tarball against the darwin hash and fail every run.  This job
          # already ran `pnpm install` + `pnpm build` above, so oxnode is proven
          # working; importing the constant (same source of truth as
          # src/rootfs/build.ts) cannot select the darwin block or a comment,
          # and the script's 64-hex assertion fails closed on a malformed pin.
          # Invoke the bin directly (NOT `pnpm exec`, whose "Done in …ms" banner
          # would pollute the captured stdout) so the value is the sha alone.
          vp_sha_x64="$(./node_modules/.bin/oxnode scripts/print-vite-plus-sha.ts x64)"
          vp_sha_arm64="$(./node_modules/.bin/oxnode scripts/print-vite-plus-sha.ts arm64)"
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lc}/script-jail-rootfs"
          : > docker-image-refs.txt

          # Belt-and-suspenders: the script already asserts 64-hex and exits
          # non-zero on a bad arch, but re-check here so a wrong-shaped value can
          # never reach the expensive buildx work or the VP_SHA256 build-arg.
          if [ -z "${vp_version}" ] || [ -z "${node_version}" ]; then
            echo "failed to parse VITE_PLUS_VERSION / NODE_VERSION from src/rootfs/vite-plus.ts" >&2
            exit 1
          fi
          case "${vp_sha_x64}" in *[!0-9a-f]* | "") echo "vp_sha_x64 is not 64-hex: '${vp_sha_x64}'" >&2; exit 1 ;; esac
          case "${vp_sha_arm64}" in *[!0-9a-f]* | "") echo "vp_sha_arm64 is not 64-hex: '${vp_sha_arm64}'" >&2; exit 1 ;; esac
          [ "${#vp_sha_x64}" = 64 ] || { echo "vp_sha_x64 wrong length: '${vp_sha_x64}'" >&2; exit 1; }
          [ "${#vp_sha_arm64}" = 64 ] || { echo "vp_sha_arm64 wrong length: '${vp_sha_arm64}'" >&2; exit 1; }

          build_one() {
            local runner_image="$1"
            local ubuntu_major="$2"
            local arch="$3"
            local platform="$4"
            local vp_sha="$5"
            local tag="$6"
            local metadata
            local digest
            local ubuntu_ref
            metadata="$(mktemp)"

            # Pin the GHCR build's base image to the SAME per-(runner_image,arch)
            # `ubuntu@sha256:…` digest the local rootfs build threads as
            # UBUNTU_REF (src/rootfs/build.ts UBUNTU_BASE_DIGEST).  Without this
            # the published image would `FROM` a floating `ubuntu:<major>` tag
            # and drift away from the rootfs ext4s the manifest backfill must
            # reproduce.
            #
            # We read the committed map with the bundled `node` (this step does
            # not need oxnode): scope to the runner-image block, then pull the
            # per-arch `ubuntu@sha256:…` string.  runner_image/arch are passed
            # via env (not interpolated into the JS literal) to avoid
            # quoting/injection issues; an unknown key writes an empty string so
            # the guard below fails loudly rather than leaking an `undefined`
            # into --build-arg.
            ubuntu_ref="$(SJ_RUNNER_IMAGE="${runner_image}" SJ_ARCH="${arch}" node -e '
              const fs = require("fs");
              const src = fs.readFileSync("src/rootfs/build.ts", "utf8");
              const ri = process.env.SJ_RUNNER_IMAGE.replace(/[.]/g, "\\.");
              const block = src.match(new RegExp("[\"\x27]" + ri + "[\"\x27]\\s*:\\s*\\{([\\s\\S]*?)\\}"));
              let out = "";
              if (block) {
                const am = block[1].match(new RegExp("\\b" + process.env.SJ_ARCH + "\\s*:\\s*[\"\x27]([^\"\x27]+)[\"\x27]"));
                if (am) out = am[1];
              }
              process.stdout.write(out);
            ')"
            if [ -z "${ubuntu_ref}" ]; then
              echo "::error::no pinned UBUNTU_REF for ${runner_image}/${arch} in src/rootfs/build.ts" >&2
              exit 1
            fi

            docker buildx build \
              --platform="${platform}" \
              --push \
              --metadata-file="${metadata}" \
              --build-arg "UBUNTU_REF=${ubuntu_ref}" \
              --build-arg "UBUNTU_MAJOR=${ubuntu_major}" \
              --build-arg "VP_VERSION=${vp_version}" \
              --build-arg "VP_ARCH=${arch}" \
              --build-arg "VP_SHA256=${vp_sha}" \
              --build-arg "NODE_VERSION=${node_version}" \
              -f src/rootfs/Dockerfile.base \
              -t "${image}:${tag}" \
              -t "${image}:${tag}-${{ inputs.tag }}" \
              .

            digest="$(jq -r '."containerimage.digest"' "${metadata}")"
            if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
              echo "docker buildx did not report a digest for ${tag}" >&2
              exit 1
            fi
            printf '%s=%s@%s\n' "${runner_image}_${arch}" "${image}:${tag}" "${digest}" >> docker-image-refs.txt
          }

          # x64 push uses the restored x64 shim already at images/libscriptjail.so.
          build_one ubuntu-22.04 22.04 x64 linux/amd64 "${vp_sha_x64}" ubuntu-22.04
          build_one ubuntu-24.04 24.04 x64 linux/amd64 "${vp_sha_x64}" ubuntu-24.04

          # arm64 push needs the arm64 shim at the single Dockerfile COPY target.
          cp images/libscriptjail-arm64.so images/libscriptjail.so
          build_one ubuntu-22.04 22.04 arm64 linux/arm64 "${vp_sha_arm64}" ubuntu-22.04-arm64
          build_one ubuntu-24.04 24.04 arm64 linux/arm64 "${vp_sha_arm64}" ubuntu-24.04-arm64

          linux_22="$(sed -n 's/^ubuntu-22.04_x64=//p' docker-image-refs.txt)"
          linux_24="$(sed -n 's/^ubuntu-24.04_x64=//p' docker-image-refs.txt)"
          arm64_22="$(sed -n 's/^ubuntu-22.04_arm64=//p' docker-image-refs.txt)"
          arm64_24="$(sed -n 's/^ubuntu-24.04_arm64=//p' docker-image-refs.txt)"

          {
            echo
            echo "## Docker image refs"
            echo
            echo "Update \`src/action/artifact-manifest.ts\` \`dockerImages\` with:"
            echo
            echo '```ts'
            echo "  dockerImages: {"
            echo "    x64: {"
            echo "      'ubuntu-22.04': '${linux_22}',"
            echo "      'ubuntu-24.04': '${linux_24}',"
            echo "    },"
            echo "    arm64: {"
            echo "      'ubuntu-22.04': '${arm64_22}',"
            echo "      'ubuntu-24.04': '${arm64_24}',"
            echo "    },"
            echo "  },"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
