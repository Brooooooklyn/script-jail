# script-jail — .github/workflows/parity-test.yml
#
# Compare the .script-jail.lock.yml produced by the Linux action backend
# against the committed macOS/VZ lockfile for a pinned upstream fixture, and
# fail when the canonicalized lockfiles diverge.
#
# HARD GATE:
#   Both sides now use a Linux/arm64 userspace: CI runs the Action backend on
#   `ubuntu-24.04-arm`, while the committed local side is generated by the
#   macOS/arm64 VZ CLI.  This removes the x64-vs-arm64 native package
#   divergence.  Known host/VMM and ambient CI/local noise is filtered by
#   scripts/parity-diff.ts; any remaining byte difference is treated as a real
#   parity regression and fails this workflow.
#
# WHY THE macOS SIDE IS COMMITTED, NOT GENERATED IN CI:
#   GitHub-hosted macOS runners are themselves virtualized (Anka) and
#   Apple's Virtualization.framework does not support nested virtualization,
#   so the VZ-backed CLI cannot boot a VM in CI.  Instead, a maintainer
#   generates the macOS lockfile locally on bare-metal Apple hardware and
#   commits it to `test/parity/macos-arm64-lockfile.yml`.  CI generates the
#   Linux lockfile fresh on every run and diffs it against that committed
#   file.  When the fixture pin bumps, the committed lockfile must be
#   regenerated — see test/parity/macos-arm64-lockfile.yml's header for the
#   exact local command.
#
# Fixture: test/parity/fixture.yml pins vuejs/core at a specific tag + commit
# SHA — see that file for bump instructions and the rationale for the
# fixture choice.
#
# Triggers:
#   - workflow_dispatch: manual, for ad-hoc validation.
#   - pull_request paths-filtered to the parity-relevant surface so a PR
#     touching the CLI, the action's lockfile path, the guest agent, or
#     the parity infrastructure itself gets the parity gate.  Other PRs
#     skip it to keep the routine matrix lean.
#
# What the report surfaces:
#   - Linux-only package selected on macOS (PM-flag overlay bug).
#   - Different event order between platforms (lock renderer bug).
#   - Spurious event on one side (audit-policy desync).
#   - A stale committed macOS lockfile after the Linux audit logic changed.
#   - Stale or missing parity-only filters for host/VMM noise.
#
# Expected host/VMM differences must be either filtered in scripts/parity-diff.ts
# with evidence or reflected by regenerating the committed macOS lockfile before
# merge.

name: parity-test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/cli/**'
      - 'src/shared/**'
      - 'src/guest/**'
      - 'src/host-mac/**'
      - 'src/rootfs/**'
      - 'src/lock/**'
      - 'src/action/diff.ts'
      - 'src/action/config-override.ts'
      - 'src/action/backend/**'
      - 'src/action/firecracker/**'
      - 'test/parity/**'
      - 'scripts/parity-diff.ts'
      - 'scripts/build.ts'
      - 'images/kernel/**'
      - 'images/rootfs.Dockerfile'
      - '.github/workflows/parity-test.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # resolve-fixture — single source of truth for which commit of upstream we
  # audit.  The linux-backend job reads its outputs so the fixture file
  # is read exactly once.
  # ---------------------------------------------------------------------------
  resolve-fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      repo: ${{ steps.read.outputs.repo }}
      sha: ${{ steps.read.outputs.sha }}
      tag: ${{ steps.read.outputs.tag }}
      pm: ${{ steps.read.outputs.pm }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read fixture pin
        id: read
        run: |
          set -euo pipefail
          FIXTURE=test/parity/fixture.yml
          # awk-based parse: fixture.yml is intentionally flat (no nested
          # keys) so a single `key: value` regex per line is sufficient and
          # avoids a yq dependency.
          REPO=$(awk -F': ' '/^repo: / {print $2; exit}' "$FIXTURE")
          TAG=$(awk -F': ' '/^tag: / {print $2; exit}' "$FIXTURE")
          SHA=$(awk -F': ' '/^sha: / {print $2; exit}' "$FIXTURE")
          PM=$(awk -F': ' '/^package_manager: / {print $2; exit}' "$FIXTURE")
          for v in REPO TAG SHA PM; do
            eval val=\$$v
            if [ -z "${val}" ]; then
              echo "::error::Missing '${v}' in ${FIXTURE}"
              exit 1
            fi
          done
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"   >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"   >> "$GITHUB_OUTPUT"
          echo "pm=${PM}"     >> "$GITHUB_OUTPUT"
          {
            echo "## Parity fixture"
            echo
            echo "- repo: \`${REPO}\`"
            echo "- tag: \`${TAG}\`"
            echo "- sha: \`${SHA}\`"
            echo "- package_manager: \`${PM}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # linux-backend — run the action's auto backend against the pinned upstream
  # checkout. On hosted arm64 runners Firecracker is unavailable because KVM is
  # absent, so auto falls through to the Docker backend.
  # ---------------------------------------------------------------------------
  linux-backend:
    needs: resolve-fixture
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    env:
      # The action's pre-fetch step refuses placeholder-pinned manifests in
      # consumer mode.  Inside the repo's own CI we are testing the action
      # against itself; the self-test flag skips that gate so the parity job
      # works on the very tag that publishes the artifacts.  Same convention
      # as e2e.yml.
      SCRIPT_JAIL_E2E_SELF_TEST: '1'
    steps:
      - name: Checkout script-jail
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout upstream fixture (${{ needs.resolve-fixture.outputs.repo }}@${{ needs.resolve-fixture.outputs.tag }})
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve-fixture.outputs.repo }}
          ref: ${{ needs.resolve-fixture.outputs.sha }}
          path: fixture
          persist-credentials: false

      # The repo overlay disk is sized at 2× the on-disk fixture size.  For
      # vuejs/core the `.git` directory dominates that size (deep history)
      # and is dead weight inside the VM — neither npm/pnpm nor the audit
      # touches it.  Strip it before disk packing so the overlay has more
      # proportional headroom for the install and so mkfs.ext4 has fewer
      # inodes to lay out.
      - name: Strip fixture .git before mounting into VM
        run: rm -rf fixture/.git

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Build the action bundle + the arm64 rootfs image + the shim from THIS
      # branch.  The parity test must run against the code under review,
      # not against whatever's in dist/ or a tagged release.
      - name: Build action bundle, shim, rootfs (arm64)
        run: pnpm build -- --runner-image=ubuntu-24.04 --arch=arm64

      # The action under SCRIPT_JAIL_E2E_SELF_TEST=1 skips the pre-fetch
      # download but still looks for the rootfs + shim at
      # ${RUNNER_TEMP}/script-jail-images/.  Mirrors e2e.yml's staging step
      # so Firecracker/bare fallback paths find them at the canonical
      # location.
      - name: Stage local artifacts under $RUNNER_TEMP/script-jail-images
        run: |
          set -euo pipefail
          IMAGES_DIR="${RUNNER_TEMP}/script-jail-images"
          mkdir -p "${IMAGES_DIR}"
          cp images/rootfs-ubuntu-24.04-arm64.ext4 "${IMAGES_DIR}/"
          cp images/libscriptjail.so "${IMAGES_DIR}/"
          ls -l "${IMAGES_DIR}"

      - name: Run script-jail action against fixture
        env:
          SCRIPT_JAIL_REPO_DIR: ${{ github.workspace }}/fixture
          INPUT_MODE: update
          INPUT_LOCK: ${{ github.workspace }}/linux-lockfile.yml
          INPUT_CONFIG: ${{ github.workspace }}/.script-jail.yml
          INPUT_SPOOF-ARCH: arm64
          INPUT_BACKEND: auto
        run: node dist/main.cjs

      - name: Upload Linux lockfile
        uses: actions/upload-artifact@v7
        with:
          name: linux-lockfile
          path: linux-lockfile.yml
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # macos-bare — run the macOS-NATIVE bare backend against the SAME pinned
  # upstream checkout, on a hosted macos-14 runner.
  #
  # WHY THIS IS CI-NATIVE (unlike the VZ path):
  #   The VZ-backed CLI cannot boot in CI because GitHub-hosted macOS runners
  #   are themselves virtualized and Apple's Virtualization.framework does not
  #   nest.  The BARE backend needs NO VM — it runs the install directly on the
  #   Mac under the Mach-O shim (DYLD_INSERT_LIBRARIES), so it runs fine on a
  #   hosted runner.  This is the first CI-native macOS parity gate the VZ path
  #   could never provide.
  #
  #   macos-14 hosted runners are Apple Silicon (arm64), matching the Linux side
  #   (ubuntu-24.04-arm).  The bare backend provisions + ad-hoc re-signs its own
  #   Node at runtime (so DYLD_INSERT_LIBRARIES is honoured); the dylib is built
  #   from this branch by `pnpm build` below.
  # ---------------------------------------------------------------------------
  macos-bare:
    needs: resolve-fixture
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout script-jail
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Checkout upstream fixture (${{ needs.resolve-fixture.outputs.repo }}@${{ needs.resolve-fixture.outputs.tag }})
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve-fixture.outputs.repo }}
          ref: ${{ needs.resolve-fixture.outputs.sha }}
          path: fixture
          persist-credentials: false

      # The bare backend stages the repo into a private scratch dir before the
      # install, but the deep vuejs/core .git history is dead weight for the
      # audit (neither pnpm nor the shim touches it) — strip it to keep the
      # staged copy lean.
      - name: Strip fixture .git before staging
        run: rm -rf fixture/.git

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: aarch64-apple-darwin

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Build the CLI/guest bundles + the ad-hoc-signed arm64 Mach-O shim from
      # THIS branch.  The parity test must run against the code under review.
      - name: Build bundles + Mach-O shim (arm64)
        run: pnpm build

      # A minimal config so the CLI has a config to overlay; the bare backend
      # rewrites work_dir to its staged copy of the fixture.
      - name: Write a minimal script-jail config
        run: |
          printf 'spoof:\n  platform: linux\n  arch: arm64\n' > .script-jail.yml

      - name: Run script-jail check --backend bare against fixture
        env:
          # Re-signed node + shell-shim cache root for the bare backend.
          SCRIPT_JAIL_CACHE_DIR: ${{ runner.temp }}/script-jail-cache
        run: |
          node dist/cli.cjs update \
            --backend bare \
            --config "${{ github.workspace }}/.script-jail.yml" \
            --lock "${{ github.workspace }}/macos-bare-lockfile.yml" \
            --spoof-arch arm64
        working-directory: ${{ github.workspace }}/fixture

      - name: Upload macOS-bare lockfile
        uses: actions/upload-artifact@v7
        with:
          name: macos-bare-lockfile
          path: macos-bare-lockfile.yml
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # diff — compare the freshly generated Linux lockfile against the committed
  # macOS lockfile (test/parity/macos-arm64-lockfile.yml).
  #
  # The committed-macOS side is NOT generated in CI — GitHub-hosted macOS
  # runners cannot boot a nested VM (see the file header).  A maintainer
  # regenerates the committed lockfile locally whenever the fixture pin or the
  # audit logic changes; this job fails when the generated Linux lockfile
  # diverges from that committed baseline after canonicalization and
  # parity-only filters.
  # ---------------------------------------------------------------------------
  diff:
    needs: linux-backend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          name: linux-lockfile
          path: artifacts/linux

      # The macOS side is the committed file from the repo checkout.  Fail
      # loudly if it's missing rather than letting parity-diff report a
      # confusing "missing input" usage error.
      - name: Assert committed macOS lockfile exists
        run: |
          if [ ! -f test/parity/macos-arm64-lockfile.yml ]; then
            echo "::error::test/parity/macos-arm64-lockfile.yml is missing — regenerate it locally (see its header)."
            exit 1
          fi

      - name: Run parity diff
        id: diff
        # Capture the exit code without `set -e` aborting before parity-report.md
        # is written.  Exit 0 = parity, 1 = diverged, 2 = usage error / missing
        # input.  Only 0 is accepted.
        run: |
          set +e
          pnpm exec oxnode scripts/parity-diff.ts \
            --left  artifacts/linux/linux-lockfile.yml \
            --right test/parity/macos-arm64-lockfile.yml \
            --left-label  linux-backend \
            --right-label macos-arm64-vz-committed \
            --report parity-report.md
          RC=$?
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          if [ "$RC" -eq 1 ]; then
            echo "::error::Lockfiles diverged — see the parity-report artifact."
            exit 1
          fi
          if [ "$RC" -gt 1 ]; then
            echo "::error::parity-diff exited $RC (usage error or missing input)"
            exit 1
          fi

      - name: Append report to step summary
        if: always()
        run: |
          if [ -f parity-report.md ]; then
            cat parity-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-report
          path: parity-report.md
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # diff-macos-bare — compare the freshly generated Linux lockfile against the
  # freshly generated macOS-BARE lockfile (both produced in CI this run).
  #
  # Unlike the committed-VZ `diff` job above, BOTH sides here are generated on
  # this run (Linux on ubuntu-24.04-arm, macOS-bare on macos-14), so this is a
  # fully CI-native parity gate.  scripts/parity-diff.ts reconciles the one
  # documented backend difference — the Linux side runs Phase B OFFLINE so its
  # connects are `<BLOCKED>`, while macOS-bare is observe-only/ONLINE so its
  # connects succeed — by stripping the `<BLOCKED> ` prefix from connect entries
  # on both sides before comparison.  Any remaining byte difference fails here.
  # ---------------------------------------------------------------------------
  diff-macos-bare:
    needs: [linux-backend, macos-bare]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          name: linux-lockfile
          path: artifacts/linux

      - uses: actions/download-artifact@v8
        with:
          name: macos-bare-lockfile
          path: artifacts/macos-bare

      - name: Run parity diff (linux vs macos-bare)
        id: diff
        # Exit 0 = parity, 1 = diverged, 2 = usage error / missing input.
        # Only 0 is accepted.
        run: |
          set +e
          pnpm exec oxnode scripts/parity-diff.ts \
            --left  artifacts/linux/linux-lockfile.yml \
            --right artifacts/macos-bare/macos-bare-lockfile.yml \
            --left-label  linux \
            --right-label macos-bare \
            --report parity-report-macos-bare.md
          RC=$?
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          if [ "$RC" -eq 1 ]; then
            echo "::error::Linux vs macOS-bare lockfiles diverged — see the parity-report-macos-bare artifact."
            exit 1
          fi
          if [ "$RC" -gt 1 ]; then
            echo "::error::parity-diff exited $RC (usage error or missing input)"
            exit 1
          fi

      - name: Append report to step summary
        if: always()
        run: |
          if [ -f parity-report-macos-bare.md ]; then
            cat parity-report-macos-bare.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-report-macos-bare
          path: parity-report-macos-bare.md
          if-no-files-found: warn
          retention-days: 30
