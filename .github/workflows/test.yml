name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same branch / PR —
# saves runner minutes on the matrix without losing signal on the latest head.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# OpenSSF-recommended hardening: explicitly drop write scopes on GITHUB_TOKEN
# so a malicious dependency that managed to escape the sandbox can't push
# commits or comment on PRs through the runner's auth.
permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    # 10 minutes is a hard ceiling — the full unit + guest + integration
    # suite finishes in under a minute today, so anything beyond this is a
    # hang rather than slowness.
    timeout-minutes: 10
    strategy:
      # One failing combo should not mask the others — we want to see every
      # version regression in a single run, not chase them one at a time.
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        node-version: ['20', '22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pinned to the same version as `packageManager` in package.json so
          # CI and local installs resolve identical dependency graphs.
          version: 11.1.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + guest + integration)
        run: pnpm test

      # Rebuild the action entry from source and verify it matches the copy
      # committed to the repo.  action.yml's `runs.main: dist/main.js` is
      # loaded from the tagged tree, so a source change that ships without a
      # refreshed bundle would produce a tagged action that doesn't reflect
      # the source.  Catch that drift at PR time instead of at release time.
      - name: Bundle action entry
        run: pnpm build:bundle

      - name: Verify dist/main.js is up to date
        run: |
          if ! git diff --exit-code -- dist/main.js; then
            echo "::error::dist/main.js is out of date. Run 'pnpm build:bundle' locally and commit the result."
            exit 1
          fi
