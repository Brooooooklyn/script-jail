name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same branch / PR —
# saves runner minutes on the matrix without losing signal on the latest head.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# OpenSSF-recommended hardening: explicitly drop write scopes on GITHUB_TOKEN
# so a malicious dependency that managed to escape the sandbox can't push
# commits or comment on PRs through the runner's auth.
permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    # 10 minutes is a hard ceiling — the full unit + guest + integration
    # suite finishes in under a minute today, so anything beyond this is a
    # hang rather than slowness.
    timeout-minutes: 10
    strategy:
      # One failing combo should not mask the others — we want to see every
      # version regression in a single run, not chase them one at a time.
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        node-version: ['22', '24', '26']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinned to the same version as `packageManager` in package.json so
          # CI and local installs resolve identical dependency graphs.
          version: 11.1.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # The Rust shim (`src/shim/`) is compiled by the guest test suite via
      # `cargo build`.  The matrix only contains Linux runners today, so this
      # toolchain install runs on every leg.  The version here matches the
      # pin in `rust-toolchain.toml` (belt-and-braces).
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + guest + integration)
        run: pnpm test

      # Rebuild the action entry from source and verify it matches the copy
      # committed to the repo.  action.yml's `runs.main: dist/main.cjs` is
      # loaded from the tagged tree, so a source change that ships without a
      # refreshed bundle would produce a tagged action that doesn't reflect
      # the source.  Catch that drift at PR time instead of at release time.
      - name: Bundle action entry
        run: pnpm build:bundle

      - name: Verify dist/main.cjs is up to date
        run: |
          if ! git diff --exit-code -- dist/main.cjs; then
            echo "::error::dist/main.cjs is out of date. Run 'pnpm build:bundle' locally and commit the result."
            exit 1
          fi

      # The guest agent bundle is the in-VM entry point copied into the
      # rootfs by src/rootfs/build.ts.  Without a CI gate here, a source
      # change to src/guest/** that ships without `pnpm build:guest-agent`
      # would leave the committed dist/guest-agent.cjs stale — the rootfs
      # build would silently embed an out-of-date agent and the action
      # would audit installs against the old logic.  Mirror the dist/main.cjs
      # gate (Finding B, 2026-05-18).
      - name: Bundle guest agent
        run: pnpm build:guest-agent

      - name: Verify dist/guest-agent.cjs is up to date
        run: |
          if ! git diff --exit-code -- dist/guest-agent.cjs; then
            echo "::error::dist/guest-agent.cjs is out of date. Run 'pnpm build:guest-agent' locally and commit the result."
            exit 1
          fi

      # The CLI bundle is the macOS-host entry point (`pnpm exec script-jail
      # init`) the npm package ships under `bin/`.  Without a CI gate here, a
      # source change to src/cli/** or src/shared/** that ships without
      # `pnpm build:cli` would leave the committed dist/cli.cjs stale — the
      # published package would invoke an out-of-date CLI even though every
      # source-level test passed.  Mirror the dist/main.cjs gate.
      - name: Bundle CLI
        run: pnpm build:cli

      - name: Verify dist/cli.cjs is up to date
        run: |
          if ! git diff --exit-code -- dist/cli.cjs; then
            echo "::error::dist/cli.cjs is out of date. Run 'pnpm build:cli' locally and commit the result."
            exit 1
          fi
