name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same branch / PR —
# saves runner minutes on the matrix without losing signal on the latest head.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# OpenSSF-recommended hardening: explicitly drop write scopes on GITHUB_TOKEN
# so a malicious dependency that managed to escape the sandbox can't push
# commits or comment on PRs through the runner's auth.
permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    # 10 minutes is a hard ceiling — the full unit + guest + integration
    # suite finishes in under a minute today, so anything beyond this is a
    # hang rather than slowness.
    timeout-minutes: 10
    strategy:
      # One failing combo should not mask the others — we want to see every
      # version regression in a single run, not chase them one at a time.
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        node-version: ['20', '22', '24']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pinned to the same version as `packageManager` in package.json so
          # CI and local installs resolve identical dependency graphs.
          version: 11.1.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + guest + integration)
        run: pnpm test

      # Bundle the action entry so a silent regression in esbuild config or
      # an unresolved import surfaces here instead of at consumer-install time.
      # We don't commit dist/main.js (that lands at release time, not on every
      # PR), but we do verify it still builds.
      - name: Bundle action entry (smoke)
        run: pnpm build:bundle
