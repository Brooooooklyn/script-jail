# script-jail — .github/workflows/e2e.yml
#
# Layer 2 end-to-end workflow: on every PR + push-to-main, spin up a real
# Linux runner, build the action + rootfs locally, then invoke the action
# (via `uses: ./`) against `test/e2e/consumer/` inside a real Firecracker
# microVM.  Asserts that the produced lockfile contains every expected
# attack-shape marker, then tampers the lockfile and re-runs the action in
# `mode=check` to assert it fails.
#
# Why this exists:
#   The Layer 1 suite (test/e2e/*.test.ts) drives main() in-process with a
#   fake VsockSession.  It catches every host-side wiring regression but
#   never boots a VM.  Layer 2 is the inverse: it boots a real Firecracker
#   microVM on every PR so a guest-side regression (mount table, capability
#   drop, agent protocol) is caught before release.
#
# Why no committed `.script-jail.lock.yml.golden`:
#   `src/action/diff.ts` is byte-exact, and `src/guest/agent.ts`'s
#   `generated_at` field is set per VM run.  A static golden could NEVER
#   match a freshly generated lockfile — even on a clean run with no
#   regression.  Instead, we run `mode=update` first to produce the
#   canonical lockfile, assert on marker SUBSTRINGS, then sed-tamper a
#   line and re-run `mode=check` to assert exit-1.

name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same branch / PR —
# saves runner minutes (this workflow is the expensive one — it builds a
# rootfs ext4 image and boots a microVM on each matrix leg).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# OpenSSF-recommended hardening: the e2e workflow runs untrusted-ish code
# (npm-install lifecycle scripts on fixtures, inside a sandboxed VM) and
# must never carry write capabilities.
permissions:
  contents: read

jobs:
  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # 20 minutes covers worst-case: cold pnpm install + Docker rootfs build
    # (~8 min on ubuntu-22.04) + two VM boots.  Typical run is ~12 min.
    timeout-minutes: 20

    # Self-test escape hatch.  This env var disables BOTH the manifest
    # validation gate and the release-artifact pre-fetch step in
    # `src/main.ts`.  Without it, the action would refuse to run because
    # the manifest in src/action/artifact-manifest.ts contains placeholder
    # SHAs (real ones are computed at release tag time — see release.yml).
    # The flag is documented inline in src/main.ts and is intentionally
    # NOT exposed as an action input; only the script-jail repo's own e2e
    # workflow sets it.
    env:
      SCRIPT_JAIL_E2E_SELF_TEST: '1'

    strategy:
      # We want a regression visible on either matrix leg, not just whichever
      # finishes first — `fail-fast: false` keeps both legs running.
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The action invokes itself via `uses: ./` further down.  We don't
          # need git credentials persisted on disk for that — and dropping
          # them blocks a malicious fixture from `git push`-ing through the
          # runner's token if it somehow escaped the sandbox.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pinned to the same version as `packageManager` in package.json.
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # `pnpm build` below invokes `cargo build --release` to produce the
      # Rust LD_PRELOAD shim (`images/libscriptjail.so`).  The version pin
      # mirrors `rust-toolchain.toml` so both code paths resolve
      # to the same toolchain.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Sanity-check that KVM is available BEFORE we spend ~8 minutes
      # building a rootfs we wouldn't be able to use.  Both ubuntu-22.04
      # and ubuntu-24.04 GitHub-hosted runners expose /dev/kvm; this guard
      # protects against silent regressions in the runner image.
      - name: Verify /dev/kvm is present
        run: |
          if [ ! -c /dev/kvm ]; then
            echo "::error::/dev/kvm is missing on ${{ matrix.os }} — Firecracker cannot boot."
            exit 1
          fi
          ls -l /dev/kvm

      # GitHub-hosted runners create /dev/kvm with mode 0660 owned by
      # root:kvm.  The `runner` user is NOT in the kvm group on either
      # ubuntu-22.04 or ubuntu-24.04 images, so opening /dev/kvm later
      # fails with EACCES and Firecracker's InstanceStart returns
      # HTTP 400 ("Error creating KVM object: Permission denied").
      #
      # The udev-rule + udevadm-trigger recipe (common on Linux forums)
      # works on 24.04 but does NOT re-perm the already-created device
      # node on 22.04 — the trigger fires but the in-kernel uevent
      # doesn't propagate by the time the next step runs.  A direct
      # chmod is reliable on both images.
      - name: Grant runner access to /dev/kvm
        run: |
          set -euo pipefail
          sudo chmod 0666 /dev/kvm
          ls -l /dev/kvm
          # Sanity-check the runner can now open it for read+write.
          if ! test -r /dev/kvm || ! test -w /dev/kvm; then
            echo "::error::/dev/kvm still not r/w accessible after chmod 0666"
            exit 1
          fi

      # Phase A of the audit runs `npm ci` inside the VM, which needs a
      # working egress path for any registry-resolved dependency.  Firecracker
      # exposes a single tap device on the host as the guest's `eth0`; the
      # action will `PUT /network-interfaces/eth0` referencing `tap0` if a
      # tap of that name exists.
      #
      # Creating the tap requires CAP_NET_ADMIN, which the runner user does
      # not have by default — `setupTapDevice` in src/action/firecracker/launch.ts
      # therefore silently falls back to "no networking" when run unprivileged.
      # That fallback bricks Phase A: `npm ci` hangs on registry lookups and
      # the agent exits 1 without emitting a final frame, surfacing as the
      # generic "vsock session ended without a final frame".
      #
      # Pre-create the device here with sudo and hand ownership to the runner
      # user so the action's unprivileged code path can keep working.  The
      # 172.16.0.0/24 subnet matches the guest_mac the action assigns to eth0
      # (06:00:AC:10:00:02 → 172.16.0.2 by convention).  IP forwarding +
      # masquerade NAT lets the VM reach the public internet through the
      # runner's own egress.
      - name: Pre-create tap0 + enable NAT for VM egress
        run: |
          set -euxo pipefail
          sudo ip tuntap add tap0 mode tap user "$(whoami)"
          sudo ip addr add 172.16.0.1/24 dev tap0
          sudo ip link set tap0 up
          # Resolve the runner's default-route uplink so masquerade rules
          # match traffic that actually leaves the host.
          UPLINK="$(ip route show default | awk '{print $5; exit}')"
          echo "Uplink interface: ${UPLINK}"
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo iptables -t nat -A POSTROUTING -o "${UPLINK}" -j MASQUERADE
          sudo iptables -A FORWARD -i tap0 -o "${UPLINK}" -j ACCEPT
          sudo iptables -A FORWARD -i "${UPLINK}" -o tap0 -m state --state RELATED,ESTABLISHED -j ACCEPT
          ip -br link show tap0

      # Build the action bundle, Rust shim, AND the per-runner rootfs ext4
      # image.  The single `pnpm build -- --runner-image=…` call does all
      # three (action bundle → esbuild, shim → cargo build via
      # `src/shim/Cargo.toml`, rootfs → Docker + mkfs.ext4 via
      # scripts/build.ts → src/rootfs/build.ts).
      - name: Build action + shim + rootfs (${{ matrix.os }})
        run: pnpm build -- --runner-image=${{ matrix.os }}

      # `preFetchArtifacts` is skipped under SCRIPT_JAIL_E2E_SELF_TEST, so the
      # action will NOT download the rootfs / .so from a release.  Instead
      # it looks for `rootfs-<runner-image>.ext4` at
      # `${RUNNER_TEMP}/script-jail-images/`.  Copy the locally-built artifacts
      # into that exact path so the rest of main.ts (overlay → launch)
      # finds them without any further code changes.
      - name: Stage local artifacts under $RUNNER_TEMP/script-jail-images
        run: |
          set -euo pipefail
          IMAGES_DIR="${RUNNER_TEMP}/script-jail-images"
          mkdir -p "${IMAGES_DIR}"
          cp images/rootfs-${{ matrix.os }}.ext4 "${IMAGES_DIR}/"
          cp images/libscriptjail.so "${IMAGES_DIR}/"
          ls -l "${IMAGES_DIR}"

      # ----------------------------------------------------------------------
      # Stage a self-contained consumer project.
      # ----------------------------------------------------------------------
      # The committed `test/e2e/consumer/` references its fixtures via
      # `file:../../fixtures/<name>`.  Those paths only resolve against the
      # original checkout layout — but `makeOverlay()` copies only
      # `GITHUB_WORKSPACE` into the VM (mounted at `/work`), so anything
      # outside the consumer dir is invisible inside the VM.  Running
      # `npm ci` in the guest would fail with "ENOENT ../../fixtures/...".
      #
      # We stage a self-contained mirror under `$RUNNER_TEMP/consumer/` that
      # vendors each fixture under `./fixtures/<name>`, rewrites the
      # consumer's `package.json` to point at the vendored copies, then
      # regenerates `package-lock.json` against the new paths.  Pointing
      # `GITHUB_WORKSPACE` at this staged dir gives `detectPm()`,
      # `parseInputs()`, and `makeOverlay()` a consistent, copyable root.
      #
      # Why not just symlink: the overlay's `cpSync({ dereference: false })`
      # would copy the symlinks themselves into the VM, which then dangle.
      # Why not regenerate the lock at commit time: the lockfile would still
      # bake the original `../../fixtures/...` paths in, defeating the
      # purpose of the rewrite.
      - name: Stage self-contained consumer project under $RUNNER_TEMP/consumer
        run: |
          set -euo pipefail
          STAGED="${RUNNER_TEMP}/consumer"
          rm -rf "${STAGED}"
          mkdir -p "${STAGED}/fixtures"
          # Copy fixtures (the consumer depends on 7 attack fixtures +
          # victim-package; copying the whole tree keeps the workflow
          # forward-compatible with new fixtures).
          cp -R test/fixtures/. "${STAGED}/fixtures/"
          # Copy the consumer's script-jail config verbatim.
          cp test/e2e/consumer/.script-jail.yml "${STAGED}/.script-jail.yml"
          # Rewrite the consumer's package.json to point at the vendored
          # fixtures.  The committed file uses `file:../../fixtures/<name>`;
          # `./fixtures/<name>` resolves relative to the staged dir.
          sed 's|file:\.\./\.\./fixtures/|file:./fixtures/|g' \
            test/e2e/consumer/package.json > "${STAGED}/package.json"
          # Regenerate package-lock.json so it reflects the rewritten paths.
          # `--ignore-scripts` is critical: we must NOT run the fixtures'
          # lifecycle scripts on the runner — they are the very payloads the
          # VM is supposed to audit.
          (cd "${STAGED}" && npm install --package-lock-only --ignore-scripts)
          ls -la "${STAGED}"
          cat "${STAGED}/package.json"

      # ----------------------------------------------------------------------
      # Happy path: mode=update produces a lockfile containing every marker.
      # ----------------------------------------------------------------------

      # `uses: ./` invokes the action from THIS checkout's action.yml.  No
      # release is needed — the dist/main.cjs committed to the repo (drift-
      # guarded by .github/workflows/test.yml) is what runs.
      #
      # GITHUB_WORKSPACE override: src/main.ts uses `GITHUB_WORKSPACE` as the
      # repo root for `detectPm()`, `parseInputs()` (relative path
      # resolution), and `makeOverlay()` (which copies the entire dir into
      # the VM mounted at /work).  Without this override the action would
      # audit the script-jail repo itself (whose `pnpm-lock.yaml` would be
      # detected as the consumer's lockfile), not the consumer fixture.
      # The action has no `working-directory` input today; overriding
      # GITHUB_WORKSPACE is the narrowest way to point at the staged
      # consumer dir without adding new public API.  ${{ runner.temp }} is
      # the GitHub Actions per-job scratch directory, cleared between jobs.
      #
      # Action paths resolved under the override: with GITHUB_WORKSPACE
      # pointing at the staged consumer dir, the action's default `config`
      # and `lock` inputs (`.script-jail.yml`, `.script-jail.lock.yml`) resolve to
      # files inside the staged dir, exactly what we want.
      #
      # The action is deliberately invoked WITHOUT any of the consumer's
      # protected env vars in scope.  The consumer's `.script-jail.yml` lists
      # NPM_TOKEN / NODE_AUTH_TOKEN / GITHUB_TOKEN / etc; exporting any of
      # those here would let the guest scrub-via-emit them legitimately and
      # change the rendered <HIDDEN> NAME marker (e.g. mark a previously
      # unset var as "found").  Keep the env clean.
      - name: Run script-jail against consumer (mode=update)
        id: update
        uses: ./
        env:
          # GitHub Actions reserves GITHUB_WORKSPACE and silently drops a
          # step-level override of it, so the action couldn't be pointed at
          # the staged consumer dir that way.  SCRIPT_JAIL_REPO_DIR is the
          # documented escape hatch in src/main.ts:140; it takes precedence
          # over both GITHUB_WORKSPACE and process.cwd() and is documented
          # inline at the read site.  Without this override the action
          # would copy the script-jail repo root into /work, where its own
          # pnpm-lock.yaml would (incorrectly) make the VM audit script-jail
          # itself instead of the consumer fixture.
          SCRIPT_JAIL_REPO_DIR: ${{ runner.temp }}/consumer
        with:
          mode: update

      # Borrow the substring list from test/e2e/generate.test.ts: the
      # Layer-1 suite asserts the same markers against a faked guest, so
      # if Layer 2 sees a different rendered shape, that is a real-VM-only
      # regression we want to flag.  All 15 assertions cover the 7 fixtures.
      - name: Assert produced lockfile contains every expected marker
        run: |
          set -euo pipefail
          LOCK="${{ runner.temp }}/consumer/.script-jail.lock.yml"
          # Diagnostic: dump the staged consumer dir before asserting on
          # the lockfile.  Saved us hours last time the lockfile wasn't
          # at the expected path; cheap to leave in.
          echo "--- ls of consumer dir ---"
          ls -la "${{ runner.temp }}/consumer/" || true
          echo "--- expected lockfile path ---"
          echo "$LOCK"
          test -s "$LOCK"
          echo "--- full lockfile content ---"
          cat "$LOCK"
          echo "--- begin marker assertions ---"

          # Each grep prints a helpful label first so the failing one
          # is obvious in the log (bash `set -e` exits on first failure).
          assert_marker() {
            local marker="$1"
            if grep -qF "$marker" "$LOCK"; then
              echo "  ✓ $marker"
            else
              echo "::error::missing marker: $marker"
              return 1
            fi
          }

          # Per-package keys (one per fixture).
          assert_marker 'reads-home-ssh@1.0.0:'
          assert_marker 'reads-secret-env@1.0.0:'
          assert_marker 'spawns-gcc@1.0.0:'
          assert_marker 'tries-dlopen@1.0.0:'
          assert_marker 'tries-network-egress@1.0.0:'
          assert_marker 'writes-into-repo@1.0.0:'
          assert_marker 'cross-package-tampering@1.0.0:'

          # Attack-shape markers, mirroring test/e2e/generate.test.ts.
          assert_marker '<HIDDEN> $HOME/.ssh/id_rsa'
          # `<HIDDEN> NPM_TOKEN` is detected by the env-spy.cjs JS preload
          # (NODE_OPTIONS=--require).  Node.js parses environ[] at startup
          # into an in-memory Map and serves `process.env.X` from there
          # without re-entering libc, so the LD_PRELOAD env-shim alone
          # cannot see `process.env.NPM_TOKEN`.  The env-spy preload wraps
          # process.env in a Proxy that logs every read and hides values
          # for names in the protected list — closing this gap end-to-end.
          assert_marker '<HIDDEN> NPM_TOKEN'
          assert_marker '<ENOENT> gcc'
          assert_marker '<BLOCKED> $PKG/evil.node'
          # Network egress: src/lock/normalize.ts renders
          #   `<BLOCKED> connect <host>:<port>`
          # We match the stable prefix only — the fixture uses
          # 198.51.100.7:443 today but the host/port could change.
          assert_marker '<BLOCKED> connect '
          assert_marker '$REPO/.bashrc'
          assert_marker '<CROSS_PACKAGE> $NODE_MODULES/victim-package/index.js'

          echo "All 15 marker assertions passed."

          # ------------------------------------------------------------------
          # False-positive assertions for the 'normal' deps (express, axios,
          # dotenv, yaml, zod).  None of these packages declares any
          # lifecycle script, so:
          #   1. The audit pipeline records nothing for them — their
          #      `<name>@<version>:` entry must NOT appear as a top-level
          #      key under `packages:` in the lockfile.  Their PRESENCE in
          #      the lock would mean a phantom event was attributed to a
          #      package with no scripts to attribute from.
          #   2. The lockfile-global `audit_bypass:` field is rendered ONLY
          #      when non-empty (see src/lock/render.ts OPTIONAL_LIST_FIELDS).
          #      No legitimate path through the audit pipeline produces an
          #      audit_bypass entry — its appearance is the load-bearing
          #      tamper signal.  Installing benign packages must not
          #      synthesize one.
          # If either assertion fires, we have a false positive worth
          # investigating before merging.
          echo "--- false-positive assertions for normal deps ---"
          for pkg in 'express@' 'axios@' 'dotenv@' 'yaml@' 'zod@'; do
            if grep -qE "^  ${pkg}" "$LOCK"; then
              echo "::error::false positive — '$pkg' appears as a package entry in the lockfile but has no lifecycle scripts"
              grep -nE "^  ${pkg}" "$LOCK"
              exit 1
            else
              echo "  ✓ no entry for ${pkg} (expected — no lifecycle scripts)"
            fi
          done
          if grep -qE '^\s*audit_bypass:' "$LOCK"; then
            echo "::error::false positive — audit_bypass entries appeared in the lockfile"
            grep -nE -A2 '^\s*audit_bypass:' "$LOCK"
            exit 1
          else
            echo "  ✓ no audit_bypass entries (expected — clean install + caught attacks)"
          fi

      # ----------------------------------------------------------------------
      # Tamper path: remove a marker line and assert mode=check fails exit-1.
      # ----------------------------------------------------------------------

      - name: Tamper the produced lockfile
        run: |
          set -euo pipefail
          LOCK="${{ runner.temp }}/consumer/.script-jail.lock.yml"
          # Drop the `<HIDDEN> $HOME/.ssh/id_rsa` line.  It is a YAML sequence
          # entry like `          - <HIDDEN> $HOME/.ssh/id_rsa` — sed's
          # pattern matches the payload regardless of indent.  We pick this
          # marker (rather than NPM_TOKEN) because it reliably appears in
          # the produced lockfile — see the long note in the marker-assert
          # step above on why NPM_TOKEN is not currently asserted.
          sed -i.bak '/<HIDDEN> \$HOME\/.ssh\/id_rsa/d' "$LOCK"
          remaining="$(grep -c '<HIDDEN> \$HOME/.ssh/id_rsa' "$LOCK" || true)"
          if [ "$remaining" != "0" ]; then
            echo "::error::Tamper step left $remaining matching line(s) in $LOCK"
            exit 1
          fi
          rm -f "$LOCK.bak"

      - name: Re-run script-jail against the tampered lockfile (mode=check)
        id: tampered
        continue-on-error: true
        uses: ./
        env:
          # Same workspace override as the update step above — see the long
          # comment there for why SCRIPT_JAIL_REPO_DIR (not GITHUB_WORKSPACE)
          # is the right knob: GitHub Actions silently drops step-level
          # GITHUB_WORKSPACE overrides, so without this the action would
          # audit the script-jail repo itself rather than the consumer.
          SCRIPT_JAIL_REPO_DIR: ${{ runner.temp }}/consumer
        with:
          mode: check

      # Two-part assertion: (a) the action exited non-zero, AND (b) the
      # failure was because of the diff we induced — not a boot failure or
      # other infrastructure problem.  The action's `diff` output is the
      # unified diff between committed and generated lockfiles; it is set
      # BEFORE the action exits 1 in mode=check, so it is reliably populated
      # on this code path.  We grep for the marker line that we deleted —
      # the diff will contain a `+` line re-introducing it.
      - name: Assert the tampered mode=check run failed for the expected reason
        # Pass the diff via env (rather than interpolating into the script
        # body) so multi-line content with shell metacharacters is preserved
        # safely without heredoc-escaping gymnastics.  This is the GitHub-
        # recommended pattern for consuming multi-line step outputs.
        env:
          TAMPERED_OUTCOME: ${{ steps.tampered.outcome }}
          TAMPERED_DIFF: ${{ steps.tampered.outputs.diff }}
        run: |
          set -euo pipefail
          if [ "$TAMPERED_OUTCOME" != "failure" ]; then
            echo "::error::tampered mode=check should have failed, but outcome=$TAMPERED_OUTCOME"
            exit 1
          fi
          if [ -z "$TAMPERED_DIFF" ]; then
            echo "::error::tampered mode=check failed but produced an empty diff output (probable infra failure, not a real mismatch)"
            exit 1
          fi
          if ! printf '%s' "$TAMPERED_DIFF" | grep -qF '<HIDDEN> $HOME/.ssh/id_rsa'; then
            echo "::error::tampered mode=check failed but the diff does not reference the deleted '<HIDDEN> \$HOME/.ssh/id_rsa' line"
            printf '%s\n' "$TAMPERED_DIFF"
            exit 1
          fi
          echo "tampered mode=check correctly failed with the expected diff."
