# script-jail — .github/workflows/release.yml
#
# Release pipeline: on every `v*.*.*` tag push, build the per-runner rootfs
# ext4 images, the Docker rootfs images, the libscriptjail.so Rust shim, and
# the action bundle, then publish the artifacts.
#
# Why this exists:
#   Firecracker/bare backends consume the rootfs + .so via
#   `src/action/pre-fetch-artifacts.ts`, which downloads from
#   https://github.com/<repo>/releases/download/<tag>/<asset> and verifies
#   each file against a pinned SHA-256 in src/action/artifact-manifest.ts.
#   The Docker backend consumes digest-pinned GHCR images from the same
#   manifest. This workflow produces both forms.
#
# Bootstrap caveat:
#   The first release tagged on a fresh fork will produce real SHAs that do
#   NOT match the placeholders in src/action/artifact-manifest.ts.  The
#   workflow prints the real SHAs and Docker image refs in its step summary;
#   copy them into the manifest and cut the NEXT tag.  From the second release
#   onward, the manifest matches each tag's assets and image refs.
#
# Supply-chain hardening:
#   We split into two jobs so the GITHUB_TOKEN with write scopes only exists
#   during the final publish step:
#     - `build` runs install / typecheck / test / build with the
#       default-read token AND `persist-credentials: false`, so a malicious
#       dependency lifecycle script cannot write to the repo or its
#       releases via the runner's git credentials.
#     - `publish` is a minimal job that only downloads verified build
#       artifacts, pushes GHCR images, and uploads release assets. Only this
#       job carries contents:write/packages:write.

name: release

on:
  push:
    tags: ['v*.*.*']

# Job-level permissions (set per-job below) override this default; we still
# pin contents:read at the workflow level so any future job that forgets to
# declare its own permissions gets the safest default.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # build-mac-bin — produce the Mach-O `script-jail-vm-arm64-darwin` binary.
  # Runs on a macos-latest Apple-Silicon runner; emits the binary as a workflow
  # artifact that the main `build` job downloads to compute its SHA and that
  # `publish` uploads to the release.
  #
  # We keep this job tightly scoped — no `pnpm install`, no Docker, no
  # access to the consumer-tree of the action — so the macOS runner only
  # ever runs `cargo build` against the in-repo Rust workspace.  Splitting
  # this off (vs. running it inside `build`) also lets the (much cheaper)
  # rootfs build proceed in parallel on the Linux runner.
  # ---------------------------------------------------------------------------
  build-mac-bin:
    runs-on: macos-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: . -> target

      - name: cargo build (release)
        run: cargo build --release -p script-jail-host-mac

      - name: Stage binary
        run: |
          set -euo pipefail
          mkdir -p artifacts/mac-bin
          cp target/release/script-jail-vm \
             artifacts/mac-bin/script-jail-vm-arm64-darwin

      - name: Upload Mach-O artifact
        uses: actions/upload-artifact@v7
        with:
          name: script-jail-vm-arm64-darwin
          path: artifacts/mac-bin/script-jail-vm-arm64-darwin
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # build — install/test/build with NO write capabilities and no persisted
  # checkout credentials.  Hands the final artifacts off to `publish` via the
  # standard actions/upload-artifact mechanism.
  # ---------------------------------------------------------------------------
  build:
    # Requires `build-mac-bin` because the SHA paste-block + manifest
    # bootstrap path need to include the Mach-O binary's hash.  The runner
    # downloads that artifact mid-job to feed it into `Compute SHAs`.
    needs: build-mac-bin
    runs-on: ubuntu-24.04
    # The rootfs build invokes Docker + mkfs.ext4 twice (once per runner
    # image); 30 minutes is comfortable headroom over the typical ~10-min
    # combined runtime.  PR 5 also runs the VZ kernel build (~5-10 min)
    # twice, so the total budget needs a slight bump.
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Don't leave the GITHUB_TOKEN persisted as a git credential after
          # checkout.  install/test/build phases run npm/pnpm lifecycle
          # scripts and Docker — a compromised dep should not inherit a
          # repo token, even a read-only one.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # The shim is a Rust cdylib (`src/shim/`); cargo is required before
      # `pnpm build` or the explicit shim-build step further down.  The
      # version pin matches `rust-toolchain.toml`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Surface manifest status at tag-push time.  This step INVOKES the
      # same validator that protects consumers at action runtime
      # (`src/main.ts` → `validateManifest`); the script's
      # `--warn-only-placeholders` flag narrowly suppresses ONLY the
      # documented bootstrap case — every entry is still the literal
      # `PLACEHOLDER_SHA256_*` string the manifest ships with.  Any other
      # malformed value (typo'd hash, uppercase hex, wrong length) still
      # exits 1 and fails the publish, because those represent real
      # packaging bugs that would brick every consumer.
      #
      # Why warn-only for placeholders: the first tag on a fresh fork by
      # definition has placeholders (no release exists yet to compute real
      # SHAs from); a hard gate here would make the documented bootstrap
      # loop — publish → copy SHAs from job summary → cut next tag —
      # unreachable.  Consumer protection still lives in
      # `src/action/validate-manifest.ts`, which throws unconditionally.
      - name: Validate pinned artifact manifest (bootstrap-aware)
        # Run the validator unguarded under `set -e`: with `--warn-only-placeholders`
        # the script exits 0 when every offender is a known bootstrap
        # placeholder, and exits non-zero for any genuine validation
        # failure (uppercase hex, wrong length, typo, etc.). Wrapping the
        # invocation in `if … then … fi` would swallow that non-zero exit,
        # so we run it directly and only the placeholder-warning text is
        # conditional on grep.
        run: |
          set -euo pipefail
          pnpm exec oxnode scripts/validate-manifest.ts --warn-only-placeholders
          if grep -q 'PLACEHOLDER_SHA256_' src/action/artifact-manifest.ts; then
            echo "::warning::Manifest contains placeholder SHAs. This release will NOT run as an action for consumers. After publishing, copy the SHAs computed below into src/action/artifact-manifest.ts and cut the next release."
            {
              echo "## :warning: Manifest contains placeholder SHAs"
              echo
              echo "This release will **NOT** run as an action for consumers."
              echo "After publishing, copy the SHAs printed by the"
              echo "\"Compute SHAs\" step into \`src/action/artifact-manifest.ts\`"
              echo "and cut the next release."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build action bundle
        run: pnpm build:bundle

      - name: Build CLI bundle
        # The macOS CLI ships as `dist/cli.cjs` and is consumed by `npm install`
        # users on Darwin.  We bundle it in the same release flow so the npm
        # tarball that pairs with this tag carries an up-to-date CLI.
        run: pnpm build:cli

      - name: Build Rust shim (x86_64)
        run: |
          cargo build --release --manifest-path src/shim/Cargo.toml
          cp target/release/libscriptjail.so images/libscriptjail.so

      # PR 5: arm64 shim build infra.  The cross-toolchain is required so
      # cargo-zigbuild + zig produce the aarch64-unknown-linux-gnu ELF
      # .so from the amd64 release runner.  Same tool also works from
      # macOS, so a future move to a different runner doesn't require
      # touching the build script.  rustup-target-add is invoked first
      # because dtolnay/rust-toolchain's `stable` does not pre-install it.
      - name: Install arm64 cross-toolchain (kernel deps only)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            flex \
            bison \
            libelf-dev \
            libssl-dev \
            bc \
            xz-utils \
            gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build Rust shim (arm64 — cross-compile via cargo-zigbuild)
        run: pnpm build -- --skip-rootfs --skip-bundle --shim-arm64

      # The arm64 rootfs builds below run `docker buildx --platform=linux/arm64`
      # on an x86_64 runner.  Without QEMU binfmt registration the runner
      # kernel can't execute the arm64 `/bin/sh` (etc.) the buildx steps
      # invoke, surfacing as `exec /bin/sh: exec format error`.  Registered
      # once here so both arm64 rootfs build steps (ubuntu-22.04, ubuntu-24.04)
      # see it.  No-op for the x64 rootfs builds.
      - name: Register QEMU binfmt handlers (for linux/arm64 build)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      # Build BOTH x64 rootfs ext4 images, reusing the bundle + shim built above.
      # `--skip-bundle` and `--skip-shim` avoid the redundant work the build
      # script would otherwise repeat per --runner-image invocation.
      - name: Build rootfs (ubuntu-22.04, x64)
        run: pnpm build -- --runner-image=ubuntu-22.04 --skip-bundle --skip-shim

      - name: Build rootfs (ubuntu-24.04, x64)
        run: pnpm build -- --runner-image=ubuntu-24.04 --skip-bundle --skip-shim

      # PR 5: build the two arm64 rootfs ext4 images for the macOS CLI.
      # `--arch=arm64` selects the arm64 base image AND skips the redundant
      # x64 shim build (the arm64 .so above already produced
      # `images/libscriptjail-arm64.so`).
      - name: Build rootfs (ubuntu-22.04, arm64)
        run: pnpm build -- --runner-image=ubuntu-22.04 --arch=arm64 --skip-bundle --skip-shim

      - name: Build rootfs (ubuntu-24.04, arm64)
        run: pnpm build -- --runner-image=ubuntu-24.04 --arch=arm64 --skip-bundle --skip-shim

      # The arm64 rootfs build stages libscriptjail-arm64.so to the canonical
      # images/libscriptjail.so path because Dockerfile.base has one COPY
      # target. Restore the x64 shim before computing/uploading the Linux
      # action artifact.
      - name: Restore x64 shim artifact
        run: cp target/release/libscriptjail.so images/libscriptjail.so

      # PR 5: build the two VZ kernels.  Pinned upstream version + per-arch
      # config; see images/kernel/build.sh for the full pipeline.
      - name: Build vmlinux-vz (x86_64)
        run: bash images/kernel/build.sh --arch=x86_64 --force

      - name: Build vmlinux-vz (arm64)
        run: bash images/kernel/build.sh --arch=arm64 --force

      # Compute SHA-256 of every released artifact and surface them in the
      # job summary so the maintainer can copy the digests into
      # src/action/artifact-manifest.ts before cutting the next release.
      # The Mach-O binary (`script-jail-vm-arm64-darwin`) is produced by
      # the `build-mac-bin` job below; we re-fetch it here via a workflow
      # artifact so the SHA summary can include it in the paste-block.
      - name: Download script-jail-vm Mach-O artifact
        uses: actions/download-artifact@v8
        with:
          name: script-jail-vm-arm64-darwin
          path: artifacts/mac-bin

      - name: Compute SHAs
        id: shas
        run: |
          set -euo pipefail
          # --- Linux platform artifacts ---
          LINUX_ROOTFS_22="$(sha256sum images/rootfs-ubuntu-22.04.ext4 | cut -d' ' -f1)"
          LINUX_ROOTFS_24="$(sha256sum images/rootfs-ubuntu-24.04.ext4 | cut -d' ' -f1)"
          LINUX_LIBSO="$(sha256sum images/libscriptjail.so | cut -d' ' -f1)"
          # --- Darwin platform artifacts ---
          DARWIN_ROOTFS_22_ARM64="$(sha256sum images/rootfs-ubuntu-22.04-arm64.ext4 | cut -d' ' -f1)"
          DARWIN_ROOTFS_24_ARM64="$(sha256sum images/rootfs-ubuntu-24.04-arm64.ext4 | cut -d' ' -f1)"
          DARWIN_LIBSO_ARM64="$(sha256sum images/libscriptjail-arm64.so | cut -d' ' -f1)"
          VMLINUX_VZ_X86_64="$(sha256sum images/vmlinux-vz-x86_64 | cut -d' ' -f1)"
          VMLINUX_VZ_ARM64="$(sha256sum images/vmlinux-vz-arm64 | cut -d' ' -f1)"
          SJ_VM_ARM64_DARWIN="$(sha256sum artifacts/mac-bin/script-jail-vm-arm64-darwin | cut -d' ' -f1)"
          # --- Surface as job outputs (also useful for downstream steps) ---
          {
            echo "linux_rootfs_22=${LINUX_ROOTFS_22}"
            echo "linux_rootfs_24=${LINUX_ROOTFS_24}"
            echo "linux_libso=${LINUX_LIBSO}"
            echo "darwin_rootfs_22_arm64=${DARWIN_ROOTFS_22_ARM64}"
            echo "darwin_rootfs_24_arm64=${DARWIN_ROOTFS_24_ARM64}"
            echo "darwin_libso_arm64=${DARWIN_LIBSO_ARM64}"
            echo "vmlinux_vz_x86_64=${VMLINUX_VZ_X86_64}"
            echo "vmlinux_vz_arm64=${VMLINUX_VZ_ARM64}"
            echo "sj_vm_arm64_darwin=${SJ_VM_ARM64_DARWIN}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "## Artifact SHAs"
            echo
            echo "Update \`src/action/artifact-manifest.ts\` with:"
            echo
            echo '```ts'
            echo "export const PINNED_MANIFEST: ArtifactManifest = {"
            echo "  repo: '${{ github.repository }}',"
            echo "  tag: '${{ github.ref_name }}',"
            echo "  expected: {"
            echo "    linux: {"
            echo "      'rootfs-ubuntu-22.04.ext4': '${LINUX_ROOTFS_22}',"
            echo "      'rootfs-ubuntu-24.04.ext4': '${LINUX_ROOTFS_24}',"
            echo "      'libscriptjail.so':         '${LINUX_LIBSO}',"
            echo "    },"
            echo "    darwin: {"
            echo "      'rootfs-ubuntu-22.04-arm64.ext4': '${DARWIN_ROOTFS_22_ARM64}',"
            echo "      'rootfs-ubuntu-24.04-arm64.ext4': '${DARWIN_ROOTFS_24_ARM64}',"
            echo "      'libscriptjail-arm64.so':         '${DARWIN_LIBSO_ARM64}',"
            echo "      'vmlinux-vz-x86_64':              '${VMLINUX_VZ_X86_64}',"
            echo "      'vmlinux-vz-arm64':               '${VMLINUX_VZ_ARM64}',"
            echo "      'script-jail-vm-arm64-darwin':    '${SJ_VM_ARM64_DARWIN}',"
            echo "    },"
            echo "  },"
            echo "};"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Hand artifacts to the publish job.  Using a workflow artifact (rather
      # than a job output or cache) keeps the build job side-effect-free
      # outside its own filesystem.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: |
            images/rootfs-ubuntu-22.04.ext4
            images/rootfs-ubuntu-24.04.ext4
            images/rootfs-ubuntu-22.04-arm64.ext4
            images/rootfs-ubuntu-24.04-arm64.ext4
            images/libscriptjail.so
            images/libscriptjail-arm64.so
            images/vmlinux-vz-x86_64
            images/vmlinux-vz-arm64
            dist/main.cjs
            dist/guest-agent.cjs
            dist/cli.cjs
            dist/preloads/*.cjs
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # publish — minimal job that has release/package write scopes, downloads the
  # build job artifacts, verifies them, publishes Docker rootfs images, and
  # uploads the release assets. No install, no test runs — nothing that
  # executes third-party dependency code.
  # ---------------------------------------------------------------------------
  publish:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write

    steps:
      # Re-checkout the tagged source on a separate runner whose filesystem
      # has NOT seen `pnpm install`.  This gives us a clean, independently-
      # obtained copy of src/action/artifact-manifest.ts and dist/main.cjs
      # that the build job's third-party code could not have tampered with.
      # `persist-credentials: false` keeps the GITHUB_TOKEN out of git
      # credentials; the release upload below receives the write-scoped
      # token via the workflow env, not via git.
      - name: Checkout (verification source)
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          # download-artifact@v4 preserves the directory structure under the
          # given path.  We isolate the downloaded artifacts under ./artifacts
          # so they cannot overwrite the freshly-checked-out source tree
          # (in particular dist/main.cjs, which we compare against below).
          path: artifacts

      # PR 5: the macOS Mach-O binary is uploaded as a separate workflow
      # artifact by the `build-mac-bin` job (it can't be cross-built on
      # the Linux runner).  Land it under `artifacts/` so
      # `check-publish-artifacts.sh` finds it at
      # `artifacts/script-jail-vm-arm64-darwin`.
      - name: Download Mach-O artifact
        uses: actions/download-artifact@v8
        with:
          name: script-jail-vm-arm64-darwin
          path: artifacts

      # Independently verify the downloaded artifacts against the SHAs the
      # tagged source committed.  See scripts/check-publish-artifacts.sh for
      # the threat model and bootstrap-path handling.  Crucially, this runs
      # BEFORE the upload step, so a mismatch refuses to publish.
      - name: Verify downloaded artifacts against tagged manifest
        run: |
          bash scripts/check-publish-artifacts.sh \
            --manifest src/action/artifact-manifest.ts \
            --dir artifacts \
            --dist-source dist/main.cjs \
            --dist-cli-source dist/cli.cjs

      - name: Verify Docker runtime JS artifacts
        run: |
          set -euo pipefail
          cmp -s artifacts/dist/guest-agent.cjs dist/guest-agent.cjs
          cmp -s artifacts/dist/preloads/platform-spoof.cjs dist/preloads/platform-spoof.cjs
          cmp -s artifacts/dist/preloads/env-spy.cjs dist/preloads/env-spy.cjs
          cmp -s artifacts/dist/preloads/dlopen-block.cjs dist/preloads/dlopen-block.cjs

      - name: Register QEMU binfmt handlers (for linux/arm64 Docker publish)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish Docker rootfs images
        run: |
          set -euo pipefail

          mkdir -p dist/preloads images
          cp artifacts/dist/guest-agent.cjs dist/guest-agent.cjs
          cp artifacts/dist/preloads/*.cjs dist/preloads/

          vp_version="$(sed -nE "s/^export const VITE_PLUS_VERSION = '([^']+)'.*/\1/p" src/rootfs/vite-plus.ts)"
          node_version="$(sed -nE "s/^export const NODE_VERSION = '([^']+)'.*/\1/p" src/rootfs/vite-plus.ts)"
          vp_sha_x64="$(sed -nE "s/^[[:space:]]*x64:[[:space:]]*'([^']+)'.*/\1/p" src/rootfs/vite-plus.ts)"
          vp_sha_arm64="$(sed -nE "s/^[[:space:]]*arm64:[[:space:]]*'([^']+)'.*/\1/p" src/rootfs/vite-plus.ts)"
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner_lc}/script-jail-rootfs"
          : > docker-image-refs.txt

          if [ -z "${vp_version}" ] || [ -z "${node_version}" ] || [ -z "${vp_sha_x64}" ] || [ -z "${vp_sha_arm64}" ]; then
            echo "failed to parse src/rootfs/vite-plus.ts" >&2
            exit 1
          fi

          build_one() {
            local runner_image="$1"
            local ubuntu_major="$2"
            local arch="$3"
            local platform="$4"
            local vp_sha="$5"
            local tag="$6"
            local metadata
            local digest
            metadata="$(mktemp)"

            docker buildx build \
              --platform="${platform}" \
              --push \
              --metadata-file="${metadata}" \
              --build-arg "UBUNTU_MAJOR=${ubuntu_major}" \
              --build-arg "VP_VERSION=${vp_version}" \
              --build-arg "VP_ARCH=${arch}" \
              --build-arg "VP_SHA256=${vp_sha}" \
              --build-arg "NODE_VERSION=${node_version}" \
              -f src/rootfs/Dockerfile.base \
              -t "${image}:${tag}" \
              -t "${image}:${tag}-${{ github.ref_name }}" \
              .

            digest="$(jq -r '."containerimage.digest"' "${metadata}")"
            if [ -z "${digest}" ] || [ "${digest}" = "null" ]; then
              echo "docker buildx did not report a digest for ${tag}" >&2
              exit 1
            fi
            printf '%s=%s@%s\n' "${runner_image}_${arch}" "${image}:${tag}" "${digest}" >> docker-image-refs.txt
          }

          cp artifacts/images/libscriptjail.so images/libscriptjail.so
          build_one ubuntu-22.04 22.04 x64 linux/amd64 "${vp_sha_x64}" ubuntu-22.04
          build_one ubuntu-24.04 24.04 x64 linux/amd64 "${vp_sha_x64}" ubuntu-24.04

          cp artifacts/images/libscriptjail-arm64.so images/libscriptjail.so
          build_one ubuntu-22.04 22.04 arm64 linux/arm64 "${vp_sha_arm64}" ubuntu-22.04-arm64
          build_one ubuntu-24.04 24.04 arm64 linux/arm64 "${vp_sha_arm64}" ubuntu-24.04-arm64

          linux_22="$(sed -n 's/^ubuntu-22.04_x64=//p' docker-image-refs.txt)"
          linux_24="$(sed -n 's/^ubuntu-24.04_x64=//p' docker-image-refs.txt)"
          arm64_22="$(sed -n 's/^ubuntu-22.04_arm64=//p' docker-image-refs.txt)"
          arm64_24="$(sed -n 's/^ubuntu-24.04_arm64=//p' docker-image-refs.txt)"

          {
            echo
            echo "## Docker image refs"
            echo
            echo "Update \`src/action/artifact-manifest.ts\` \`dockerImages\` with:"
            echo
            echo '```ts'
            echo "  dockerImages: {"
            echo "    x64: {"
            echo "      'ubuntu-22.04': '${linux_22}',"
            echo "      'ubuntu-24.04': '${linux_24}',"
            echo "    },"
            echo "    arm64: {"
            echo "      'ubuntu-22.04': '${arm64_22}',"
            echo "      'ubuntu-24.04': '${arm64_24}',"
            echo "    },"
            echo "  },"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # softprops/action-gh-release@v3 auto-creates the release for the tag
      # (or appends to an existing one) and uploads each listed file.  We pin
      # to the major tag — the maintainer's standard practice in this repo
      # for actions that publish frequent patch releases.
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/images/rootfs-ubuntu-22.04.ext4
            artifacts/images/rootfs-ubuntu-24.04.ext4
            artifacts/images/rootfs-ubuntu-22.04-arm64.ext4
            artifacts/images/rootfs-ubuntu-24.04-arm64.ext4
            artifacts/images/libscriptjail.so
            artifacts/images/libscriptjail-arm64.so
            artifacts/images/vmlinux-vz-x86_64
            artifacts/images/vmlinux-vz-arm64
            artifacts/script-jail-vm-arm64-darwin
            artifacts/dist/main.cjs
            artifacts/dist/cli.cjs
