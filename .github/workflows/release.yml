# script-jail — .github/workflows/release.yml
#
# Release pipeline: on every `v*.*.*` tag push, DOWNLOAD the binary image
# assets a `release-build.yml` producer run already built for this tag, verify
# them against the committed manifest, and publish (GitHub release + npm).
#
# Build-once / download-forever:
#   This workflow NEVER rebuilds the rootfs ext4s, the Rust shims, the VZ
#   kernels, the Mach-O VZ helper, or the GHCR Docker images. Those are built
#   exactly once by the `release-build.yml` producer (dispatched manually on the
#   release commit with the same `tag`), which uploads the binary assets as
#   tag-suffixed Actions artifacts (`release-assets-<tag>`, `mac-bin-<tag>`) and
#   pushes the 4 GHCR rootfs images. This release run locates that producer run
#   by the tag-suffixed artifact NAME (the producer runs on a DIFFERENT commit
#   than the tag — the pre-backfill commit — so a commit-SHA match is
#   impossible; the binary assets are invariant across the manifest backfill, so
#   matching by tag is correct). The committed-manifest SHA verification in
#   check-publish-artifacts.sh is the integrity backstop.
#
# Why this exists:
#   Firecracker/bare backends consume the rootfs + .so via
#   `src/action/pre-fetch-artifacts.ts`, which downloads from
#   https://github.com/<repo>/releases/download/<tag>/<asset> and verifies
#   each file against a pinned SHA-256 in src/action/artifact-manifest.ts.
#   The Docker backend consumes digest-pinned GHCR images from the same
#   manifest. This workflow uploads the release assets and verifies the GHCR
#   digests resolve; the producer already pushed the images.
#
# Supply-chain hardening:
#   We split into two jobs so the GITHUB_TOKEN with write scopes only exists
#   during the final publish step:
#     - `verify` runs install / typecheck / test / bundle-freshness with the
#       default-read token AND `persist-credentials: false`, so a malicious
#       dependency lifecycle script cannot write to the repo or its releases
#       via the runner's git credentials. It also gates that the committed
#       manifest is fully real (no placeholders) at tag time.
#     - `publish` is a minimal job that downloads the producer's verified
#       binary artifacts, checks them against the manifest, and uploads release
#       assets + publishes npm. Only this job carries contents:write/id-token.

name: release

on:
  push:
    tags: ['v*.*.*']

# Job-level permissions (set per-job below) override this default; we still
# pin contents:read at the workflow level so any future job that forgets to
# declare its own permissions gets the safest default.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # verify — install / typecheck / test, rebuild the committed dist bundles and
  # assert they are fresh (the same drift gate test.yml enforces), and gate that
  # the pinned manifest is fully real (no PLACEHOLDER_SHA256_* tokens) at tag
  # time. Runs with NO write capabilities and no persisted checkout credentials.
  # It builds NOTHING that ships (no rootfs/shim/kernel/Mach-O/GHCR) — those are
  # the producer's job. `publish` depends on this job so a failed gate blocks the
  # irreversible publish.
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Don't leave the GITHUB_TOKEN persisted as a git credential after
          # checkout.  install/test/build phases run npm/pnpm lifecycle
          # scripts — a compromised dep should not inherit a repo token, even
          # a read-only one.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      # The shim is a Rust cdylib (`src/shim/`); cargo is required for the
      # bundle build flow below. The version pin matches `rust-toolchain.toml`.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Manifest-no-placeholders gate. At tag time the committed manifest MUST
      # be fully real: the producer→backfill flow requires the operator to paste
      # the real SHAs/digests before pushing the tag, so any remaining
      # PLACEHOLDER_SHA256_* token is an un-backfilled (broken) release that
      # would brick every Action consumer (and ship a placeholder dist/main.cjs
      # to npm). Unlike the old two-tag bootstrap, there is no documented
      # placeholder-at-tag-time case here, so this fails LOUD rather than warns.
      # validate-manifest.ts (no --warn-only-placeholders) also enforces shape
      # (lowercase 64-hex, etc.); the explicit grep adds a tag-time, human-
      # readable refusal naming the exact failure mode.
      - name: Gate manifest contains no placeholders (must be fully backfilled)
        run: |
          set -euo pipefail
          if grep -q 'PLACEHOLDER_SHA256_' src/action/artifact-manifest.ts; then
            echo "::error::src/action/artifact-manifest.ts still contains PLACEHOLDER_SHA256_* tokens. Backfill the real SHAs/digests from the release-build.yml run (paste-block) before tagging — a placeholder manifest ships a broken Action and a broken dist/main.cjs."
            exit 1
          fi
          pnpm exec oxnode scripts/validate-manifest.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Rebuild the committed bundles and assert they are byte-identical to what
      # the tag carries. This mirrors test.yml's dist-freshness gate, enforced at
      # tag-push time too: the npm package + GitHub-release dist assets ship the
      # COMMITTED bundles (release.yml never re-bundles for shipping), so a stale
      # dist/ at the tag would publish source that doesn't match src/.
      - name: Build action bundle
        run: pnpm build:bundle

      - name: Build CLI bundle
        run: pnpm build:cli

      - name: Build repro-hash CLI bundle
        run: pnpm build:repro-hash

      - name: Build guest agent bundle
        run: pnpm build:guest-agent

      # Gate the four esbuild bundles (the same set test.yml gates). The
      # dist/preloads/*.cjs are authored static copies of src/guest/*.cjs (no
      # esbuild step regenerates them), so they are not part of this rebuild
      # freshness diff — they ship verbatim from the committed tree.
      - name: Verify committed dist bundles are up to date
        run: |
          if ! git diff --exit-code -- \
            dist/main.cjs \
            dist/cli.cjs \
            dist/guest-agent.cjs \
            dist/repro-hash-cli.cjs; then
            echo "::error::Committed dist bundles are out of date. Run 'pnpm build:bundle && pnpm build:cli && pnpm build:guest-agent && pnpm build:repro-hash' locally and commit the result."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # publish — minimal job that has release write scopes + OIDC. It downloads the
  # producer's tag-suffixed binary artifacts (NEVER rebuilds them), verifies them
  # against the committed manifest, uploads the release assets, and publishes the
  # four npm packages. The npm package's dist/* ships from THIS tagged checkout
  # (REPO_ROOT) — the producer's dist is never shipped.
  # ---------------------------------------------------------------------------
  publish:
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
      # `actions: read` is required to list + download artifacts from a DIFFERENT
      # workflow run (the release-build.yml producer). `packages: read` lets the
      # GHCR login + imagetools inspect (digest-resolve gate) read the images the
      # producer already pushed — no `packages: write` because this job no longer
      # pushes any image.
      packages: read
      actions: read
      id-token: write

    steps:
      # Re-checkout the tagged source on a runner whose filesystem has NOT seen
      # `pnpm install`. This gives a clean, independently-obtained copy of
      # src/action/artifact-manifest.ts and the committed dist/* bundles that the
      # producer's third-party code could not have tampered with.
      # `persist-credentials: false` keeps the GITHUB_TOKEN out of git
      # credentials; the release upload below receives the write-scoped token via
      # the workflow env, not via git.
      - name: Checkout (verification source)
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Locate the release-build.yml producer run that carries this tag's binary
      # artifacts and download them into ./artifacts. The producer ran on a
      # DIFFERENT commit (the pre-backfill commit), so we cannot match by commit
      # SHA — we match by the tag-suffixed artifact NAME (`release-assets-<tag>`
      # / `mac-bin-<tag>`). We walk successful release-build runs newest-first
      # and take the first that actually carries the artifact, so a re-dispatched
      # producer (e.g. after a transient failure) resolves to the latest build.
      # ${TAG} = github.ref_name (this job runs on the tag, so ref_name IS the
      # tag here).
      #
      # NOTE: the committed manifest MUST be backfilled from the LATEST successful
      # producer run for the tag — because this lookup picks newest-first,
      # backfilling SHAs from an older run's paste-block while a newer run exists
      # downloads the newer run's binaries, whose kernel/Mach-O bytes are not
      # reproducible, and the SHA verify below will fail.
      - name: Download producer build artifacts (by tag-suffixed name)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          assets_name="release-assets-${TAG}"
          mac_name="mac-bin-${TAG}"

          # Newest-first list of successful release-build runs (run IDs only).
          run_ids="$(gh run list \
            --workflow release-build.yml \
            --status success \
            --limit 50 \
            --json databaseId \
            --jq '.[].databaseId')"
          if [ -z "${run_ids}" ]; then
            echo "::error::no successful release-build.yml runs found; dispatch release-build.yml with tag=${TAG} on the release commit first" >&2
            exit 1
          fi

          found_run=""
          for run_id in ${run_ids}; do
            # Does THIS run carry the tag-suffixed binary artifact?
            # A transient per-run API error (rate-limit, 5xx, GC'd run) must NOT
            # abort the whole lookup under `set -euo pipefail` before we reach the
            # wanted run — soft-skip the failing run and keep scanning newest-first.
            names="$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" \
              --jq '.artifacts[].name')" || {
              echo "warn: could not list artifacts for run ${run_id}, skipping" >&2
              continue
            }
            if printf '%s\n' "${names}" | grep -qx "${assets_name}"; then
              found_run="${run_id}"
              break
            fi
          done

          if [ -z "${found_run}" ]; then
            echo "::error::no release-build run found carrying ${assets_name}; dispatch release-build.yml with tag=${TAG} on the release commit first" >&2
            exit 1
          fi

          echo "Using release-build run ${found_run} for ${assets_name} / ${mac_name}"

          # Download the binary image assets into artifacts/images. The producer
          # uploaded all 8 entries under a single `images/` prefix, so
          # upload-artifact collapses the common ancestor and the artifact
          # contents are FLAT (rootfs-*.ext4, libscriptjail*.so, vmlinux-vz-* at
          # the artifact root). Targeting `--dir artifacts/images` restores the
          # `artifacts/images/<name>` layout that check-publish-artifacts.sh and
          # the release-asset upload below both expect.
          mkdir -p artifacts/images
          gh run download "${found_run}" \
            --name "${assets_name}" \
            --dir artifacts/images

          # Download the Mach-O VZ helper to the artifacts ROOT (the on-disk
          # filename inside the artifact stays script-jail-vm-arm64-darwin, which
          # check-publish-artifacts.sh + assemble-npm-packages.mjs expect at
          # artifacts/script-jail-vm-arm64-darwin).
          gh run download "${found_run}" \
            --name "${mac_name}" \
            --dir artifacts

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1 (and Node >= 22.14.0,
      # satisfied by node 24). The npm bundled with the Node 24 setup can be
      # older, so pin a known-good version that performs the OIDC token exchange
      # and sends the registry payload the current trust API expects.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.16.0

      # Independently verify the downloaded binary artifacts against the SHAs the
      # tagged source committed. See scripts/check-publish-artifacts.sh for the
      # threat model. Crucially, this runs BEFORE the upload step, so a mismatch
      # refuses to publish. We DO NOT pass --dist-source/--dist-cli-source: the
      # producer no longer ships dist/*, so there is nothing downloaded to
      # compare; the dist/* that ships comes from this tagged checkout and is
      # already verified by the `verify` job's freshness gate (and test.yml).
      - name: Verify downloaded artifacts against tagged manifest
        run: |
          bash scripts/check-publish-artifacts.sh \
            --manifest src/action/artifact-manifest.ts \
            --dir artifacts

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # `docker buildx imagetools inspect` (the digest-resolve gate below) needs
      # a buildx builder; set one up explicitly so the gate does not depend on the
      # hosted runner having a default builder configured. This pushes NOTHING —
      # the GHCR `docker buildx build --push` lives only in the producer
      # (release-build.yml); here we only inspect the digests it already pushed.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Backfill gate: the pinned `dockerImages` in the tagged
      # src/action/artifact-manifest.ts must actually resolve in GHCR before any
      # npm publish runs. The producer pushed these images on the release commit;
      # this gate catches a hand-copy typo or a stale/GC'd digest that would
      # otherwise ship inside dist/main.cjs and break Docker-backend consumers
      # (`docker pull <ref>` → manifest unknown). The Docker rootfs images are
      # NOT byte-reproducible, so we assert EXISTENCE, not equality. Runs after
      # GHCR login, before publish, so a bad digest blocks the (irreversible) npm
      # publish. The manifest is read with the bundled `node` (this job is
      # install-free, so no oxnode); the 4 refs are the only
      # `ghcr.io/…@sha256:` string literals in the file. Placeholders are
      # impossible at tag time (the `verify` job's manifest gate fails first),
      # but the skip branch is kept defensively.
      - name: Verify pinned Docker digests resolve in GHCR (backfill gate)
        run: |
          set -euo pipefail
          refs="$(node -e '
            const fs = require("fs");
            const s = fs.readFileSync("src/action/artifact-manifest.ts", "utf8");
            const re = /["\x27](ghcr\.io\/[^"\x27]+@sha256:[^"\x27]+)["\x27]/g;
            let m; const out = [];
            while ((m = re.exec(s)) !== null) out.push(m[1]);
            process.stdout.write(out.join("\n"));
          ')"
          if [ -z "${refs}" ]; then
            echo "::error::could not extract any dockerImages refs from src/action/artifact-manifest.ts" >&2
            exit 1
          fi
          # refs are newline-separated and contain no whitespace/glob chars, so
          # the unquoted word-split below is intentional and safe.
          rc=0
          for ref in ${refs}; do
            case "${ref}" in
              *PLACEHOLDER_SHA256_*)
                echo "skip (bootstrap placeholder): ${ref}"
                ;;
              *)
                if docker buildx imagetools inspect "${ref}" >/dev/null 2>&1; then
                  echo "ok (resolves in GHCR): ${ref}"
                else
                  echo "::error::pinned Docker digest does not resolve in GHCR: ${ref}" >&2
                  rc=1
                fi
                ;;
            esac
          done
          if [ "${rc}" -ne 0 ]; then
            echo "::error::one or more pinned Docker digests are missing from GHCR; refusing to publish" >&2
            exit 1
          fi

      # Stage all four publishable npm packages. scripts/npm-packages.mjs is the
      # single source of truth for the package set (the tiny JS-only main
      # `script-jail` plus the three per-platform optional packages
      # @script-jail/{darwin-arm64,linux-x64,linux-arm64}). assemble-npm-packages.mjs
      # stages each into npm-staging/<dir>/: the dist/* JS bundles come from THIS
      # tagged checkout (REPO_ROOT, real manifest), and the BINARY artifacts
      # (gzipped rootfs ext4s, shims, VZ kernel, Mach-O helper) come from the
      # downloaded ./artifacts dir.
      #
      # The version==tag gate stays here: the main package.json version (which
      # the assembler propagates to every staged manifest) must equal the tag.
      - name: Stage npm packages
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "${package_version}" != "${version}" ]; then
            echo "::error::package.json version (${package_version}) must match tag ${GITHUB_REF_NAME}"
            exit 1
          fi

          node scripts/assemble-npm-packages.mjs \
            --artifacts artifacts \
            --out npm-staging \
            --version "${version}"

      # npm silently drops missing `files` entries, so `npm pack --dry-run`
      # alone is not a gate. Assert each staged package's packed file list,
      # exec bit (darwin VZ helper), and size against its canonical spec before
      # any publish runs.
      - name: Validate npm packlists
        run: node scripts/assert-npm-packlist.mjs --all npm-staging

      # softprops/action-gh-release@v3 auto-creates the release for the tag
      # (or appends to an existing one) and uploads each listed file.  We pin
      # to the major tag — the maintainer's standard practice in this repo
      # for actions that publish frequent patch releases.
      #
      # The binary assets come from the downloaded producer artifacts; the
      # dist/* action bundles (main.cjs/cli.cjs) come from THIS tagged checkout
      # (REPO_ROOT), so the GitHub release carries the real-manifest bundle.
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/images/rootfs-ubuntu-22.04.ext4
            artifacts/images/rootfs-ubuntu-24.04.ext4
            artifacts/images/rootfs-ubuntu-22.04-arm64.ext4
            artifacts/images/rootfs-ubuntu-24.04-arm64.ext4
            artifacts/images/libscriptjail.so
            artifacts/images/libscriptjail-arm64.so
            artifacts/images/vmlinux-vz-x86_64
            artifacts/images/vmlinux-vz-arm64
            artifacts/script-jail-vm-arm64-darwin
            dist/main.cjs
            dist/cli.cjs

      # Publish the platform packages FIRST, then the main `script-jail`
      # package LAST. This order is load-bearing: the main package's
      # optionalDependencies (@script-jail/{darwin-arm64,linux-x64,linux-arm64})
      # must already be on the registry so a consumer `npm install script-jail`
      # can resolve the matching one for its os/cpu. The staging dir names below
      # are exactly the sanitized `dir` values produced by
      # scripts/npm-packages.mjs / assemble-npm-packages.mjs.
      #
      # npm publish is the only NON-re-runnable step in this job: a version that
      # has already been published cannot be re-published. If a later package
      # fails after an earlier one succeeded, recovery is to re-run only the
      # still-unpublished packages, or bump the version and re-tag — there is no
      # in-place fix for an already-published version.
      - name: Publish npm packages (platform-first, main last)
        # Trusted publishing (OIDC) — no auth-token secret. The `id-token: write`
        # permission on this job lets npm (>= 11.5.1, upgraded above) exchange a
        # short-lived OIDC token with the registry against the trusted-publisher
        # configs (repo Brooooooklyn/scriptjail, workflow release.yml, permission
        # publish) set for all four packages. Provenance attestations are
        # generated and published automatically, so no --provenance flag.
        run: |
          set -euo pipefail
          # Idempotent publish: skip any package whose exact name@version is
          # already on the registry, publish the rest. WHY:
          #   - It makes every release re-run safe: if a later package fails
          #     after an earlier one published, re-running republishes only the
          #     still-unpublished packages (the documented recovery).
          #   - It also keeps a re-run that re-pushes the same tag from 409ing
          #     ("cannot publish over an existing version") and aborting this
          #     `set -euo pipefail` job RED.
          # `npm view <name>@<version> version` is a read-only, no-auth probe;
          # its non-zero exit (version absent) is consumed by the `if`, so it
          # never trips `pipefail`. Platform packages first, main last — the
          # main package's optionalDependencies must resolve at install time.
          publish_if_absent() {
            local dir="$1"
            local name version
            name="$(node -p "require('./npm-staging/${dir}/package.json').name")"
            version="$(node -p "require('./npm-staging/${dir}/package.json').version")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version} — already published"
            else
              (cd "npm-staging/${dir}" && npm publish --access public)
            fi
          }
          for pkg in script-jail-darwin-arm64 script-jail-linux-x64 script-jail-linux-arm64; do
            publish_if_absent "${pkg}"
          done
          publish_if_absent script-jail
